// ─── VENDOR BILLS ─────────────────────────────────────────────────────────────
function VendorBillsRoute() {
  const [bills, setBills] = React.useState(SEED.vendorBills);
  const [open, setOpen] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [formOpen, setFormOpen] = React.useState(false);
  const [draft, setDraft] = React.useState({
    vendorId: SEED.vendors[0]?.id || '',
    poId: '',
    vendorInvoice: '',
    invoiceDate: '',
    dueDate: '',
    subtotal: 0,
    gstPct: 18,
  });

  if (open) {
    return <VendorBillDetail
      bill={open}
      onBack={() => setOpen(null)}
      onUpdate={(updated) => {
        setBills(bills.map(b => b.id === updated.id ? updated : b));
        setOpen(updated);
      }}/>;
  }

  const pending = bills.filter(b => b.status === 'pending-match' || b.status === 'discrepancy').length;
  const matched = bills.filter(b => b.status === 'matched' || b.status === 'approved').length;
  const overdue = bills.filter(b => b.status === 'overdue');
  const due30   = bills.filter(b => b.status !== 'paid').reduce((a,b)=>a+(b.total - b.amountPaid),0);

  const exportCsv = () => setToast({ tone:'positive', msg:`Exported ${bills.length} vendor bills to vendor_bills.csv.` });

  const submitBill = () => {
    if (!draft.vendorInvoice.trim()) { setToast({ tone:'amber', msg:'Vendor invoice number is required.' }); return; }
    const subtotal = +draft.subtotal;
    if (subtotal <= 0) { setToast({ tone:'amber', msg:'Subtotal must be greater than zero.' }); return; }
    const v = SEED.vendors.find(x => x.id === draft.vendorId);
    const interstate = v?.state !== 'Karnataka';
    const gst = Math.round(subtotal * (+draft.gstPct) / 100);
    const total = subtotal + gst;
    const linkedPo = SEED.purchaseOrders.find(p => p.id === draft.poId);
    const status = !draft.poId ? 'pending-match' : Math.abs(total - (linkedPo?.total || 0)) < 100 ? 'matched' : 'discrepancy';
    const seq = String(411 + bills.length).padStart(4, '0');
    const nextId = `BILL-2026-${seq}`;
    const bill = {
      id: nextId, vendorId: draft.vendorId, poId: draft.poId || null, grnId: null,
      vendorInvoice: draft.vendorInvoice.trim(),
      invoiceDate: draft.invoiceDate || '—',
      dueDate: draft.dueDate || '—',
      status,
      matchResult: { po: draft.poId ? 'ok' : 'pending', grn: 'pending', amount: status === 'matched' ? 'ok' : (draft.poId ? 'mismatch' : 'pending') },
      subtotal,
      cgst: interstate ? 0 : Math.round(gst/2),
      sgst: interstate ? 0 : Math.round(gst/2),
      igst: interstate ? gst : 0,
      total, amountPaid: 0,
    };
    setBills([bill, ...bills]);
    setFormOpen(false);
    setDraft({ ...draft, vendorInvoice:'', invoiceDate:'', dueDate:'', subtotal:0, poId:'' });
    setToast({ tone:'positive', msg:`${nextId} recorded · ${inr(total)} · ${status.replace('-',' ')}.` });
  };

  const filteredPos = SEED.purchaseOrders.filter(p => p.vendorId === draft.vendorId);

  return (
    <div style={{ padding:'24px 28px' }}>
      <PageHeader eyebrow="Procurement" title="Vendor bills" description="Bills reconcile against PO + GRN before approval. Discrepancies surface for buyer action."
        actions={<>
          <Btn variant="outline" size="sm" icon="download" onClick={exportCsv}>Export</Btn>
          <Btn variant="primary" size="sm" icon="plus" onClick={() => setFormOpen(true)}>Record bill</Btn>
        </>}/>
      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}
      {formOpen && (
        <CreateCard title="Record vendor bill" submitLabel="Record bill" onCancel={() => setFormOpen(false)} onSubmit={submitBill}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
            <FieldSelect label="Vendor" value={draft.vendorId} onChange={e => setDraft({...draft, vendorId: e.target.value, poId: ''})}>
              {SEED.vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </FieldSelect>
            <FieldSelect label="Against PO (optional)" value={draft.poId} onChange={e => setDraft({...draft, poId: e.target.value})}>
              <option value="">— direct bill, no PO —</option>
              {filteredPos.map(p => <option key={p.id} value={p.id}>{p.id} · {inr(p.total)}</option>)}
            </FieldSelect>
            <Field label="Vendor invoice #" value={draft.vendorInvoice} onChange={e => setDraft({...draft, vendorInvoice: e.target.value})} placeholder="HPF/INV/26/2241"/>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap: 10 }}>
            <Field label="Invoice date" value={draft.invoiceDate} onChange={e => setDraft({...draft, invoiceDate: e.target.value})} placeholder="22 Apr 26"/>
            <Field label="Due date" value={draft.dueDate} onChange={e => setDraft({...draft, dueDate: e.target.value})} placeholder="22 May 26"/>
            <Field label="Subtotal (₹)" type="number" value={draft.subtotal} onChange={e => setDraft({...draft, subtotal: e.target.value})}/>
            <FieldSelect label="GST %" value={draft.gstPct} onChange={e => setDraft({...draft, gstPct: e.target.value})}>
              {[0,5,12,18,28].map(g => <option key={g} value={g}>{g}%</option>)}
            </FieldSelect>
          </div>
          {(+draft.subtotal) > 0 && (
            <div style={{ marginTop: 12, padding:'8px 12px', background: TOKENS.paperAlt, borderRadius: 3, display:'flex', justifyContent:'space-between', fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink2 }}>
              <span>GST {inr(Math.round((+draft.subtotal) * (+draft.gstPct) / 100))} ({SEED.vendors.find(v=>v.id===draft.vendorId)?.state === 'Karnataka' ? 'CGST + SGST' : 'IGST'})</span>
              <span style={{ fontWeight: 600, color: TOKENS.ink }}>Total {inr((+draft.subtotal) + Math.round((+draft.subtotal) * (+draft.gstPct) / 100))}</span>
            </div>
          )}
        </CreateCard>
      )}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 16 }}>
        <KPI label="Pending match"   value={pending}     sub="needs buyer review" accent/>
        <KPI label="Matched"         value={matched}     sub="ready for payment"/>
        <KPI label="Overdue"         value={overdue.length} sub={inr(overdue.reduce((a,b)=>a+(b.total-b.amountPaid),0))}/>
        <KPI label="Total payable"   value={inr(due30)}  sub="next 30 days"/>
      </div>
      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['Bill #','Vendor','PO #','Invoice date','Due','Match','Amount',''].map((h, i) => (
              <th key={i} style={{ padding:'8px 12px', textAlign: i===6?'right':'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {bills.map((b, i) => {
              const v = vendorById(b.vendorId);
              return (
                <tr key={i} onClick={() => setOpen(b)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                  <td style={{ padding:'10px 12px' }}><Code>{b.id}</Code></td>
                  <td style={{ padding:'10px 12px', color: TOKENS.ink, fontWeight:500 }}>{v.name}</td>
                  <td style={{ padding:'10px 12px' }}>{b.poId ? <Code style={{ color: TOKENS.ink3 }}>{b.poId}</Code> : <span style={{ color: TOKENS.alert, fontFamily: FONT.mono, fontSize: 10.5 }}>NO PO</span>}</td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{b.invoiceDate}</td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: b.status === 'overdue' ? TOKENS.alert : TOKENS.ink3, fontWeight: b.status === 'overdue' ? 600 : 400 }}>{b.dueDate}</td>
                  <td style={{ padding:'10px 12px' }}><Pill tone={BILL_TONE[b.status]} size="sm" dot>{b.status.replace('-',' ')}</Pill></td>
                  <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, fontWeight:600, color: TOKENS.ink }}>{inr(b.total)}</td>
                  <td style={{ padding:'10px 8px', color: TOKENS.ink4 }}><Icon name="chevRight" size={13}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function VendorBillDetail({ bill, onBack, onUpdate }) {
  const [status, setStatus] = React.useState(bill.status);
  const [toast, setToast] = React.useState(null);
  const [paymentDate, setPaymentDate] = React.useState('');
  const [showSchedule, setShowSchedule] = React.useState(false);
  const v = vendorById(bill.vendorId);
  const po = bill.poId ? poById(bill.poId) : null;
  const grn = bill.grnId ? grnById(bill.grnId) : null;

  const propagate = (next) => { if (onUpdate) onUpdate({ ...bill, ...next }); };

  const resolve = () => {
    setStatus('matched');
    propagate({ status: 'matched', matchResult: { ...bill.matchResult, amount: 'ok' } });
    setToast({ tone:'positive', msg:`${bill.id} reconciled · marked matched. Routed to finance for payment scheduling.` });
  };

  const downloadPdf = () => setToast({ tone:'positive', msg:`${bill.id}.pdf queued for download.` });

  const schedulePayment = () => {
    if (!paymentDate.trim()) { setToast({ tone:'amber', msg:'Pick a payment date first.' }); return; }
    setStatus('approved');
    propagate({ status:'approved' });
    setShowSchedule(false);
    setPaymentDate('');
    setToast({ tone:'positive', msg:`Payment of ${inr(bill.total - bill.amountPaid)} to ${v.name} scheduled for ${paymentDate}.` });
  };

  const matchRow = (label, ref, result) => {
    const tone = result === 'ok' ? 'positive' : result === 'pending' ? 'amber' : 'alert';
    return (
      <div style={{ display:'grid', gridTemplateColumns:'120px 1fr 110px', gap: 10, padding:'10px 0', borderTop: `1px dashed ${TOKENS.rule}`, alignItems:'center' }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{label}</div>
        <div style={{ fontFamily: FONT.sans, fontSize: 12.5, color: TOKENS.ink }}>{ref}</div>
        <Pill tone={tone} size="sm" dot>{result}</Pill>
      </div>
    );
  };

  return (
    <div style={{ padding:'22px 28px 48px' }}>
      <div style={{ display:'flex', alignItems:'center', gap: 8, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3, marginBottom: 16 }}>
        <button onClick={onBack} style={{ background:'transparent', border:'none', color: TOKENS.ink3, cursor:'pointer', padding: 0, fontSize: 12 }}>Vendor bills</button>
        <Icon name="chevRight" size={11}/>
        <span style={{ color: TOKENS.ink }}>{bill.id}</span>
      </div>
      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 24, marginBottom: 18 }}>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 8 }}>
            <Code style={{ fontSize: 13, padding:'3px 8px', background: TOKENS.accentWash, borderRadius: 3 }}>{bill.id}</Code>
            <Pill tone={BILL_TONE[status]} dot>{status.replace('-',' ')}</Pill>
            <Pill tone="ink" size="sm">Vendor inv. {bill.vendorInvoice}</Pill>
          </div>
          <h1 style={{ fontFamily: FONT.sans, fontSize: 24, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.025em', margin: 0 }}>{v.name}</h1>
          <div style={{ marginTop: 6, fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3 }}>
            Invoice {bill.invoiceDate} · due {bill.dueDate} · GSTIN {v.gstin}
          </div>
        </div>
        <div style={{ display:'flex', gap: 8 }}>
          {(status === 'discrepancy' || status === 'pending-match') && (
            <Btn variant="primary" size="sm" icon="check" onClick={resolve}>Resolve & match</Btn>
          )}
          <Btn variant="outline" size="sm" icon="download" onClick={downloadPdf}>PDF</Btn>
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 1, background: TOKENS.rule, borderRadius: 4, overflow:'hidden', marginBottom: 18 }}>
        <StatBlock label="Subtotal"    value={inr(bill.subtotal)}/>
        <StatBlock label="GST"         value={inr((bill.cgst||0)+(bill.sgst||0)+(bill.igst||0))} sub={bill.igst ? 'IGST (interstate)' : 'CGST + SGST'}/>
        <StatBlock label="Total"       value={inr(bill.total)} accent/>
        <StatBlock label="Outstanding" value={inr(bill.total - bill.amountPaid)} sub={bill.amountPaid ? `paid ${inr(bill.amountPaid)}` : 'fully unpaid'}/>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap: 16 }}>
        <Card title="3-way match" sub="PO ↔ GRN ↔ Bill reconciliation">
          {matchRow('PO',     po  ? po.id  : 'no PO referenced',  bill.matchResult.po)}
          {matchRow('GRN',    grn ? grn.id : 'no GRN referenced', bill.matchResult.grn)}
          {matchRow('Amount', `${inr(bill.total)} vs ${po ? inr(po.total) : '—'}`, bill.matchResult.amount)}
          {!po && !grn && (
            <div style={{ marginTop: 14, padding: 12, background: TOKENS.alertWash, borderRadius: 3, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.alert }}>
              Direct vendor bill — no PO / GRN to reconcile against. Requires manual approval before payment.
            </div>
          )}
        </Card>
        <Card title="Payment schedule">
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Terms</div>
          <div style={{ fontFamily: FONT.sans, fontSize: 14, color: TOKENS.ink, marginTop: 4 }}>{v.paymentTerms}{v.msme && <Pill tone="accent" size="sm" style={{ marginLeft: 8 }}>MSME · 45-day SLA</Pill>}</div>
          <div style={{ marginTop: 14, fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Due</div>
          <div style={{ fontFamily: FONT.sans, fontSize: 18, fontWeight: 600, color: status === 'overdue' ? TOKENS.alert : TOKENS.ink, marginTop: 4 }}>{bill.dueDate}</div>
          {!showSchedule ? (
            <Btn variant="outline" size="sm" icon="check" style={{ marginTop: 14, width:'100%', justifyContent:'center' }} onClick={() => setShowSchedule(true)}>Schedule payment</Btn>
          ) : (
            <div style={{ marginTop: 14, padding: 10, background: TOKENS.paperAlt, borderRadius: 3 }}>
              <Field label="Payment date" value={paymentDate} onChange={e => setPaymentDate(e.target.value)} placeholder="e.g. 18 May 26"/>
              <div style={{ display:'flex', gap: 6, marginTop: 8 }}>
                <Btn variant="outline" size="sm" onClick={() => { setShowSchedule(false); setPaymentDate(''); }}>Cancel</Btn>
                <Btn variant="primary" size="sm" icon="check" onClick={schedulePayment}>Confirm</Btn>
              </div>
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

// ─── PROJECT MATERIALS TAB (used inside ProjectDetailRoute) ──────────────────
function ProjectMaterialsTab({ projectCode }) {
  const code = projectCode || SEED.projectDetail.code;
  const pos = SEED.purchaseOrders.filter(p => p.projectId === code);
  const skuMap = {};
  pos.forEach(p => p.lines.forEach(l => {
    if (!skuMap[l.sku]) skuMap[l.sku] = { sku: l.sku, desc: l.desc, uom: l.uom, ordered: 0, received: 0, value: 0 };
    skuMap[l.sku].ordered += l.qty;
    skuMap[l.sku].value   += l.qty * l.rate;
  }));
  pos.forEach(p => {
    const grns = SEED.grns.filter(g => g.poId === p.id);
    grns.forEach(g => g.lines.forEach(l => { if (skuMap[l.sku]) skuMap[l.sku].received += l.acceptedQty; }));
  });
  const skus = Object.values(skuMap);
  const orderedValue  = skus.reduce((a,s)=>a+s.value,0);
  const receivedValue = pos.reduce((a,p)=>a + (p.status==='received'||p.status==='closed' ? p.subtotal : 0), 0);

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr', gap: 16 }}>
      <Card title="Material rollup" sub={`${skus.length} SKUs across ${pos.length} POs · planned vs ordered vs received`}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 14, marginBottom: 14 }}>
          <KPI label="POs raised"      value={pos.length}            sub={`${pos.filter(p=>p.status!=='received'&&p.status!=='closed').length} open`}/>
          <KPI label="Ordered value"   value={inr(orderedValue)}     sub="ex GST"/>
          <KPI label="Received value"  value={inr(receivedValue)}    sub="ex GST · GRN-confirmed" accent/>
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['SKU','Description','Ordered','Received','Outstanding','Value'].map((h, i) => (
              <th key={i} style={{ padding:'8px 0', textAlign: i>=2?'right':'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {skus.map((s, i) => (
              <tr key={i} style={{ borderBottom: `1px dashed ${TOKENS.rule}` }}>
                <td style={{ padding:'10px 0' }}><Code>{s.sku}</Code></td>
                <td style={{ padding:'10px 0', color: TOKENS.ink }}>{s.desc}</td>
                <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono }}>{s.ordered} {s.uom}</td>
                <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono, color: TOKENS.positive, fontWeight: 600 }}>{s.received} {s.uom}</td>
                <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono, color: s.ordered - s.received > 0 ? TOKENS.amber : TOKENS.ink3 }}>{s.ordered - s.received} {s.uom}</td>
                <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono, fontWeight: 600 }}>{inr(s.value)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
      <Card title="Project POs" sub={`${pos.length} purchase orders raised against ${code}`}>
        {pos.length === 0 ? (
          <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>No POs raised against this project yet.</div>
        ) : (
          <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12 }}>
            <tbody>
              {pos.map((p, i) => {
                const v = vendorById(p.vendorId);
                return (
                  <tr key={i} style={{ borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
                    <td style={{ padding:'8px 0' }}><Code>{p.id}</Code></td>
                    <td style={{ padding:'8px 0', color: TOKENS.ink2 }}>{v.name}</td>
                    <td style={{ padding:'8px 0' }}><Pill tone={PO_TONE[p.status]} size="sm" dot>{p.status.replace(/-/g,' ')}</Pill></td>
                    <td style={{ padding:'8px 0', textAlign:'right', fontFamily: FONT.mono, fontWeight:600 }}>{inr(p.total)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

Object.assign(window, { VendorsRoute, PurchaseOrdersRoute, GRNsRoute, VendorBillsRoute, ProjectMaterialsTab, approvalTierFor, PO_TONE, GRN_TONE, BILL_TONE });
</script>

<script type="text/babel" data-presets="react">
// SAB — Users & roles. Reads SEED.{users,roles,userActivity}.

const ROLE_TONE   = { admin:'accent', manager:'blue', supervisor:'positive', crew:'amber', 'view-only':'ink' };
const STATUS_TONE = { active:'positive', invited:'amber', inactive:'ink' };
const PERM_COLOR  = { 'A':TOKENS.accent, 'RW':TOKENS.positive, 'R':TOKENS.blue, '—':TOKENS.ink4 };
const PERM_LABEL  = { 'A':'approve', 'RW':'edit', 'R':'view', '—':'no access' };
const MODULES = [
  { k:'projects',    label:'Projects' },
  { k:'invoices',    label:'Invoices' },
  { k:'timesheets',  label:'Timesheets' },
  { k:'procurement', label:'Procurement' },
  { k:'reports',     label:'Reports' },
  { k:'users',       label:'Users' },
];

function userById(id) { return SEED.users.find(u => u.id === id) || { name:'—', initials:'—' }; }
function roleById(id) { return SEED.roles.find(r => r.id === id) || { label:id, tone:'ink' }; }
function initialsOf(name) { return name.split(/\s+/).filter(Boolean).slice(0,2).map(s => s[0].toUpperCase()).join(''); }

function Notice({ tone='positive', children, onClose }) {
  const c = TOKENS[tone] || TOKENS.positive;
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 10, padding:'9px 12px', marginBottom: 14,
      background: `${c}14`, border: `1px solid ${c}55`, borderRadius: 4, fontFamily: FONT.sans, fontSize: 12.5, color: TOKENS.ink }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: c, flex:'none' }}/>
      <div style={{ flex: 1 }}>{children}</div>
      {onClose && <button onClick={onClose} style={{ background:'transparent', border:'none', color: TOKENS.ink3, cursor:'pointer', fontSize: 14, lineHeight: 1, padding: 2 }}>×</button>}
    </div>
  );
}

function UsersRoute() {
  const [open, setOpen]     = React.useState(null);
  const [filter, setFilter] = React.useState('all');
  const [users, setUsers]   = React.useState(SEED.users);
  const [toast, setToast]   = React.useState(null);
  const [inviteOpen, setInviteOpen] = React.useState(false);
  const [inviteName, setInviteName] = React.useState('');
  const [inviteEmail, setInviteEmail] = React.useState('');
  const [inviteRole, setInviteRole]   = React.useState('crew');

  if (open) {
    const live = users.find(u => u.id === open.id) || open;
    return <UserDetail user={live} onBack={() => setOpen(null)} onUpdate={(patch) => {
      setUsers(prev => prev.map(u => u.id === live.id ? { ...u, ...patch } : u));
    }}/>;
  }

  const all = users;
  const rows = filter === 'all' ? all : all.filter(u => u.role === filter);
  const active = all.filter(u => u.status === 'active').length;
  const invited = all.filter(u => u.status === 'invited').length;
  const mfaPct = Math.round(all.filter(u => u.mfa).length / all.length * 100);

  const submitInvite = () => {
    const name = inviteName.trim(); const email = inviteEmail.trim();
    if (!name || !email) { setToast({ tone:'amber', msg:'Name and email are required.' }); return; }
    const nextId = `U-${String(all.length + 1).padStart(3,'0')}`;
    const newUser = {
      id: nextId, name, email, phone:'+91 —', initials: initialsOf(name),
      role: inviteRole, status:'invited', mfa: false, projects: [],
      lastLogin:'—', joined: '22 Apr 26',
    };
    setUsers(prev => [...prev, newUser]);
    setInviteOpen(false); setInviteName(''); setInviteEmail(''); setInviteRole('crew');
    setToast({ tone:'positive', msg:`Invitation sent to ${email}. Awaiting acceptance.` });
  };

  const Filter = ({ k, label, count }) => (
    <button onClick={() => setFilter(k)} style={{
      padding:'5px 10px', borderRadius: 4, fontFamily: FONT.sans, fontSize: 12,
      background: filter === k ? TOKENS.ink : TOKENS.card,
      color: filter === k ? '#fff' : TOKENS.ink2,
      border: `1px solid ${filter === k ? TOKENS.ink : TOKENS.ruleStrong}`,
      cursor:'pointer', display:'inline-flex', alignItems:'center', gap: 6,
    }}>{label}{count !== undefined && <span style={{ fontFamily: FONT.mono, fontSize: 10, opacity: .7 }}>{count}</span>}</button>
  );

  return (
    <div style={{ padding: '24px 28px' }}>
      <PageHeader eyebrow="Admin" title="Users & roles" description="People with access to SAB Tracker. Roles control what each person can see, edit, or approve."
        actions={<>
          <Btn variant="outline" size="sm" icon="download" onClick={() => setToast({ tone:'positive', msg:`User list exported as CSV (${all.length} users).` })}>Export</Btn>
          <Btn variant="primary" size="sm" icon="plus" onClick={() => setInviteOpen(o => !o)}>{inviteOpen ? 'Cancel invite' : 'Invite user'}</Btn>
        </>}/>

      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}

      {inviteOpen && (
        <Card title="Invite a new user" sub="They'll receive an email link valid for 7 days.">
          <div style={{ display:'grid', gridTemplateColumns:'1.2fr 1.4fr 1fr auto', gap: 10, alignItems:'end' }}>
            <div>
              <label style={{ fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Full name</label>
              <input value={inviteName} onChange={e => setInviteName(e.target.value)} placeholder="e.g. Priya Sharma"
                style={{ width:'100%', marginTop: 4, padding:'8px 10px', border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, fontFamily: FONT.sans, fontSize: 12.5 }}/>
            </div>
            <div>
              <label style={{ fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Work email</label>
              <input value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} placeholder="name@sabindia.in"
                style={{ width:'100%', marginTop: 4, padding:'8px 10px', border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, fontFamily: FONT.sans, fontSize: 12.5 }}/>
            </div>
            <div>
              <label style={{ fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Role</label>
              <select value={inviteRole} onChange={e => setInviteRole(e.target.value)}
                style={{ width:'100%', marginTop: 4, padding:'8px 10px', border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, fontFamily: FONT.sans, fontSize: 12.5, background: TOKENS.card }}>
                {SEED.roles.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
              </select>
            </div>
            <Btn variant="primary" size="sm" icon="check" onClick={submitInvite}>Send invite</Btn>
          </div>
        </Card>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 16, marginTop: inviteOpen ? 16 : 0 }}>
        <KPI label="Total users"     value={all.length}     sub={`${active} active · ${invited} invited`} accent/>
        <KPI label="Active sessions" value={5}              sub="last 24h"/>
        <KPI label="Pending invites" value={invited}        sub={invited ? 'awaiting acceptance' : 'none open'}/>
        <KPI label="MFA enabled"     value={`${mfaPct}%`}   sub="of all users"/>
      </div>

      <RoleMatrix onEdit={() => setToast({ tone:'amber', msg:'Role editor is admin-restricted. Contact arvind.kumar@sabindia.in to modify permissions.' })}/>

      <div style={{ display:'flex', gap: 6, margin: '20px 0 12px', flexWrap:'wrap' }}>
        <Filter k="all" label="All" count={all.length}/>
        {SEED.roles.map(r => <Filter key={r.id} k={r.id} label={r.label} count={r.userCount}/>)}
      </div>

      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['User','Role','Status','Projects','Last login','MFA',''].map((h, i) => (
              <th key={i} style={{ padding:'8px 12px', textAlign:'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.map((u, i) => {
              const r = roleById(u.role);
              return (
                <tr key={i} onClick={() => setOpen(u)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                  <td style={{ padding:'10px 12px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap: 10 }}>
                      <div style={{ width: 28, height: 28, borderRadius: 4, background: TOKENS.accent, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily: FONT.sans, fontSize: 11, fontWeight: 600, flex:'none' }}>{u.initials}</div>
                      <div>
                        <div style={{ color: TOKENS.ink, fontWeight: 600 }}>{u.name}</div>
                        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>{u.email}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ padding:'10px 12px' }}><Pill tone={r.tone} size="sm" dot>{r.label}</Pill></td>
                  <td style={{ padding:'10px 12px' }}><Pill tone={STATUS_TONE[u.status]} size="sm" dot>{u.status}</Pill></td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 11, color: TOKENS.ink2 }}>{u.projects.length || '—'}</td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{u.lastLogin}</td>
                  <td style={{ padding:'10px 12px' }}>{u.mfa ? <Pill tone="positive" size="sm">on</Pill> : <Pill tone="ink" size="sm">off</Pill>}</td>
                  <td style={{ padding:'10px 8px', color: TOKENS.ink4 }}><Icon name="chevRight" size={13}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function RoleMatrix({ onEdit }) {
  return (
    <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4 }}>
      <div style={{ padding: '14px 16px', borderBottom: `1px solid ${TOKENS.rule}`, display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 12 }}>
        <div>
          <div style={{ fontFamily: FONT.sans, fontSize: 13.5, fontWeight: 600, color: TOKENS.ink }}>Role permission matrix</div>
          <div style={{ fontFamily: FONT.sans, fontSize: 11.5, color: TOKENS.ink3, marginTop: 2 }}>5 roles × 6 modules. <span style={{ color: TOKENS.positive, fontWeight: 600 }}>RW</span> can edit · <span style={{ color: TOKENS.accent, fontWeight: 600 }}>A</span> can approve · <span style={{ color: TOKENS.blue, fontWeight: 600 }}>R</span> read-only.</div>
        </div>
        <Btn variant="ghost" size="sm" onClick={onEdit}>Edit roles</Btn>
      </div>
      <div style={{ padding: 16, overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12 }}>
          <thead><tr>
            <th style={{ padding:'8px 12px 8px 0', textAlign:'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, borderBottom: `1px solid ${TOKENS.rule}` }}>Role</th>
            {MODULES.map(m => (
              <th key={m.k} style={{ padding:'8px 8px', textAlign:'center', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, borderBottom: `1px solid ${TOKENS.rule}` }}>{m.label}</th>
            ))}
            <th style={{ padding:'8px 0 8px 12px', textAlign:'right', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, borderBottom: `1px solid ${TOKENS.rule}` }}>Users</th>
          </tr></thead>
          <tbody>
            {SEED.roles.map((r, i) => (
              <tr key={i} style={{ borderBottom: i < SEED.roles.length - 1 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
                <td style={{ padding:'12px 12px 12px 0' }}>
                  <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
                    <Pill tone={r.tone} size="sm" dot>{r.label}</Pill>
                  </div>
                  <div style={{ fontFamily: FONT.sans, fontSize: 11, color: TOKENS.ink3, marginTop: 4, maxWidth: 280 }}>{r.desc}</div>
                </td>
                {MODULES.map(m => {
                  const v = r.perms[m.k] || '—';
                  return (
                    <td key={m.k} style={{ padding:'12px 8px', textAlign:'center' }}>
                      <span title={PERM_LABEL[v]} style={{
                        display:'inline-flex', alignItems:'center', justifyContent:'center',
                        minWidth: 28, height: 22, padding:'0 6px', borderRadius: 3,
                        background: v === '—' ? TOKENS.paperAlt : `${PERM_COLOR[v]}1f`,
                        color: PERM_COLOR[v],
                        fontFamily: FONT.mono, fontSize: 10.5, fontWeight: 700, letterSpacing:'.04em',
                      }}>{v}</span>
                    </td>
                  );
                })}
                <td style={{ padding:'12px 0 12px 12px', textAlign:'right', fontFamily: FONT.mono, fontSize: 12, fontWeight: 600, color: TOKENS.ink }}>{r.userCount}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function UserDetail({ user, onBack, onUpdate }) {
  const [role, setRole]         = React.useState(user.role);
  const [status, setStatus]     = React.useState(user.status);
  const [projects, setProjects] = React.useState(user.projects);
  const [assignOpen, setAssignOpen] = React.useState(false);
  const [toast, setToast]       = React.useState(null);
  const r = roleById(role);
  const activity = SEED.userActivity.filter(a => a.actor === user.id);

  const allProjectCodes = (SEED.projects || []).map(p => p.code).filter(Boolean);
  const available = allProjectCodes.filter(c => !projects.includes(c));

  const updateRole = (id) => { setRole(id); onUpdate && onUpdate({ role: id }); };
  const updateStatus = (s) => { setStatus(s); onUpdate && onUpdate({ status: s }); };
  const removeProject = (pc) => {
    const next = projects.filter(p => p !== pc);
    setProjects(next); onUpdate && onUpdate({ projects: next });
    setToast({ tone:'amber', msg:`Removed ${pc} from project access.` });
  };
  const assignProject = (pc) => {
    const next = [...projects, pc];
    setProjects(next); onUpdate && onUpdate({ projects: next });
    setAssignOpen(false);
    setToast({ tone:'positive', msg:`Assigned ${user.name} to ${pc}.` });
  };

  return (
    <div style={{ padding:'22px 28px 48px' }}>
      <div style={{ display:'flex', alignItems:'center', gap: 8, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3, marginBottom: 16 }}>
        <button onClick={onBack} style={{ background:'transparent', border:'none', color: TOKENS.ink3, cursor:'pointer', padding: 0, fontSize: 12 }}>Users & roles</button>
        <Icon name="chevRight" size={11}/>
        <span style={{ color: TOKENS.ink }}>{user.id}</span>
      </div>

      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 24, marginBottom: 18 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 14 }}>
          <div style={{ width: 56, height: 56, borderRadius: 6, background: TOKENS.accent, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontFamily: FONT.sans, fontSize: 20, fontWeight: 600 }}>{user.initials}</div>
          <div>
            <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 6 }}>
              <Pill tone={r.tone} dot>{r.label}</Pill>
              <Pill tone={STATUS_TONE[status]} size="sm" dot>{status}</Pill>
              {user.mfa && <Pill tone="positive" size="sm">MFA on</Pill>}
            </div>
            <h1 style={{ fontFamily: FONT.sans, fontSize: 24, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.025em', margin: 0 }}>{user.name}</h1>
            <div style={{ marginTop: 4, fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3, display:'flex', gap: 14 }}>
              <span>{user.email}</span><span>·</span><span>{user.phone}</span><span>·</span><span>joined {user.joined}</span>
            </div>
          </div>
        </div>
        <div style={{ display:'flex', gap: 8 }}>
          <Btn variant="outline" size="sm" icon="download" onClick={() => setToast({ tone:'positive', msg:`Exported ${activity.length} activity events for ${user.name}.` })}>Export activity</Btn>
          {status === 'active'   && <Btn variant="outline" size="sm" icon="check" onClick={() => { updateStatus('inactive'); setToast({ tone:'amber', msg:`${user.name} deactivated. Sessions revoked.` }); }}>Deactivate</Btn>}
          {status === 'inactive' && <Btn variant="primary" size="sm" icon="check" onClick={() => { updateStatus('active'); setToast({ tone:'positive', msg:`${user.name} reactivated.` }); }}>Reactivate</Btn>}
          {status === 'invited'  && <Btn variant="primary" size="sm" icon="check" onClick={() => { updateStatus('active'); setToast({ tone:'positive', msg:`Invite resent to ${user.email}.` }); }}>Resend invite</Btn>}
        </div>
      </div>

      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 1, background: TOKENS.rule, borderRadius: 4, overflow:'hidden', marginBottom: 18 }}>
        <StatBlock label="Role"            value={r.label}                sub={`${r.userCount} ${r.label.toLowerCase()}s total`} accent/>
        <StatBlock label="Projects"        value={user.projects.length}   sub={user.projects.length ? 'assigned' : 'no assignments'}/>
        <StatBlock label="Last login"      value={user.lastLogin}         sub={status === 'active' ? 'active session' : '—'}/>
        <StatBlock label="Account age"     value={user.joined}            sub="member since"/>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap: 16 }}>
        <div style={{ display:'flex', flexDirection:'column', gap: 16 }}>
          <Card title="Permissions" sub={`Inherited from ${r.label} role`}>
            <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3, marginBottom: 10 }}>{r.desc}</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 1, background: TOKENS.rule }}>
              {MODULES.map(m => {
                const v = r.perms[m.k] || '—';
                return (
                  <div key={m.k} style={{ padding:'10px 12px', background: TOKENS.card, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                    <span style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink2 }}>{m.label}</span>
                    <span style={{
                      display:'inline-flex', alignItems:'center', justifyContent:'center',
                      minWidth: 32, padding:'2px 7px', borderRadius: 3,
                      background: v === '—' ? TOKENS.paperAlt : `${PERM_COLOR[v]}1f`, color: PERM_COLOR[v],
                      fontFamily: FONT.mono, fontSize: 10.5, fontWeight: 700,
                    }}>{v}</span>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop: 14, fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Change role</div>
            <div style={{ display:'flex', gap: 6, marginTop: 8, flexWrap:'wrap' }}>
              {SEED.roles.map(opt => (
                <button key={opt.id} onClick={() => { if (opt.id !== role) { updateRole(opt.id); setToast({ tone:'positive', msg:`${user.name} role changed to ${opt.label}.` }); } }} style={{
                  padding:'5px 10px', borderRadius: 4, fontFamily: FONT.sans, fontSize: 12,
                  background: role === opt.id ? TOKENS.ink : TOKENS.card,
                  color: role === opt.id ? '#fff' : TOKENS.ink2,
                  border: `1px solid ${role === opt.id ? TOKENS.ink : TOKENS.ruleStrong}`,
                  cursor:'pointer',
                }}>{opt.label}</button>
              ))}
            </div>
          </Card>

          <Card title="Recent activity" sub={`${activity.length} event${activity.length !== 1 ? 's' : ''} attributed to this user`}>
            {activity.length === 0 ? (
              <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>No activity yet.</div>
            ) : activity.map((a, i) => (
              <div key={i} style={{ display:'flex', gap: 12, padding:'10px 0', borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
                <div style={{ width: 90, fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>{a.ts}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: FONT.sans, fontSize: 12.5, color: TOKENS.ink, fontWeight: 500 }}>{a.action}</div>
                  <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3, marginTop: 2 }}>{a.meta}</div>
                </div>
              </div>
            ))}
          </Card>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap: 16 }}>
          <Card title="Project access" sub={projects.length ? `${projects.length} active assignment${projects.length>1?'s':''}` : 'no project access'}>
            {projects.length === 0 ? (
              <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>This user is not assigned to any projects.</div>
            ) : projects.map((pc, i) => (
              <div key={pc} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0', borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
                <Code>{pc}</Code>
                <Btn variant="ghost" size="sm" onClick={() => removeProject(pc)}>Remove</Btn>
              </div>
            ))}
            {assignOpen ? (
              <div style={{ marginTop: 14, padding: 10, background: TOKENS.paperAlt, borderRadius: 4, border:`1px solid ${TOKENS.rule}` }}>
                <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, marginBottom: 8 }}>Pick a project</div>
                {available.length === 0 ? (
                  <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>No more projects available — already assigned to all.</div>

<script type="text/babel" data-presets="react">
// SAB — Clients (CRM) + Wage rates

function ClientsRoute() {
  const all = SEED.clients || [];
  const [query, setQuery]   = React.useState('');
  const [tier, setTier]     = React.useState('All');
  const [state, setState]   = React.useState('All');
  const [open, setOpen]     = React.useState(null);
  const [toast, setToast]   = React.useState(null);
  const [create, setCreate] = React.useState(false);
  const [draft, setDraft]   = React.useState({ name:'', gstin:'', state:'Karnataka', contact:'', phone:'', email:'', paymentTerms:'Net 30', tier:'Mid-market' });

  const tiers  = React.useMemo(() => Array.from(new Set(all.map(c => c.tier))).sort(), [all]);
  const states = React.useMemo(() => Array.from(new Set(all.map(c => c.state))).sort(), [all]);

  const rows = React.useMemo(() => all.filter(c => {
    if (query && ![c.name, c.contact, c.email, c.state].some(v => v && v.toLowerCase().includes(query.toLowerCase()))) return false;
    if (tier !== 'All' && c.tier !== tier) return false;
    if (state !== 'All' && c.state !== state) return false;
    return true;
  }), [all, query, tier, state]);

  const total = {
    pov:   rows.reduce((a,c) => a + c.pov, 0),
    bill:  rows.reduce((a,c) => a + c.billed, 0),
    out:   rows.reduce((a,c) => a + c.outstanding, 0),
    count: rows.length,
  };

  const exportCsv = () => {
    const head = ['ID','Name','GSTIN','State','Tier','Contact','Phone','Email','Payment terms','POs','PO Value','Billed','Outstanding','On-time pay %'];
    const body = rows.map(c => [c.id, c.name, c.gstin, c.state, c.tier, c.contact, c.phone, c.email, c.paymentTerms, c.pos, c.pov, c.billed, c.outstanding, c.onTimePayPct]);
    const csv = [head, ...body].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    try {
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'clients.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {}
    setToast({ tone:'positive', text:`Exported ${rows.length} client${rows.length===1?'':'s'} to clients.csv.` });
  };

  const saveClient = () => {
    if (!draft.name || !draft.contact || !draft.phone) {
      setToast({ tone:'amber', text:'Name, contact person and phone are required.' });
      return;
    }
    if (draft.gstin && !/^\d{2}[A-Z]{5}\d{4}[A-Z]\d[A-Z\d]Z[A-Z\d]$/.test(draft.gstin.replace(/\s/g,''))) {

        </>}/>

      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.text}</Notice>}

      {create && (
        <div style={{ background: TOKENS.card, border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, padding: 16, marginBottom: 14 }}>

            <div style={{ fontFamily: FONT.sans, fontSize: 14, fontWeight: 600 }}>Add client</div>
            <button onClick={() => setCreate(false)} style={{ background:'transparent', border:`1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 5, cursor:'pointer', color: TOKENS.ink3 }}><Icon name="x" size={12}/></button>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'2fr 1.3fr 1fr', gap: 10, marginBottom: 10 }}>
            <Field label="Client / organisation name" value={draft.name} onChange={(e) => setDraft({...draft, name:e.target.value})} placeholder="e.g. Apollo Hospitals Enterprise Ltd"/>
            <Field label="GSTIN" value={draft.gstin} onChange={(e) => setDraft({...draft, gstin:e.target.value.toUpperCase()})} placeholder="29ABCDE1234F1Z5"/>
            <FieldSelect label="State" value={draft.state} onChange={(e) => setDraft({...draft, state:e.target.value})}>
              {['Karnataka','Maharashtra','Tamil Nadu','Delhi','Haryana','Telangana','Gujarat','West Bengal','Kerala','Uttar Pradesh','Other'].map(s => <option key={s}>{s}</option>)}
            </FieldSelect>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1.3fr 1fr 1.5fr 1fr 1fr', gap: 10 }}>
            <Field label="Contact person" value={draft.contact} onChange={(e) => setDraft({...draft, contact:e.target.value})} placeholder="e.g. Dr. Ramesh Iyer"/>
            <Field label="Phone" value={draft.phone} onChange={(e) => setDraft({...draft, phone:e.target.value})} placeholder="+91 98452 11023"/>
            <Field label="Email" value={draft.email} onChange={(e) => setDraft({...draft, email:e.target.value})} placeholder="procurement@client.com"/>
            <FieldSelect label="Payment terms" value={draft.paymentTerms} onChange={(e) => setDraft({...draft, paymentTerms:e.target.value})}>
              <option>Net 15</option><option>Net 30</option><option>Net 45</option><option>Net 60</option><option>Advance</option>
            </FieldSelect>
            <FieldSelect label="Tier" value={draft.tier} onChange={(e) => setDraft({...draft, tier:e.target.value})}>
              <option>Enterprise</option><option>Mid-market</option><option>SME</option>
            </FieldSelect>
          </div>
          <div style={{ marginTop: 12, display:'flex', justifyContent:'flex-end', gap: 8 }}>
            <Btn variant="outline" size="sm" onClick={() => setCreate(false)}>Cancel</Btn>
            <Btn variant="primary" size="sm" icon="check" onClick={saveClient}>Save client</Btn>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 16 }}>
        <KPI label="Clients"            value={total.count} sub={`${tiers.length} tiers`} accent/>
        <KPI label="Total PO value"     value={inr(total.pov)} sub="lifetime, all FYs"/>
        <KPI label="Billed"             value={inr(total.bill)} sub={total.pov ? `${((total.bill/total.pov)*100).toFixed(0)}% of PO value` : '—'}/>
        <KPI label="Outstanding"        value={inr(total.out)} sub="receivables"/>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 10, flexWrap:'wrap' }}>
        <div style={{ position:'relative', flex:1, maxWidth: 360 }}>
          <div style={{ position:'absolute', left: 10, top: 8, color: TOKENS.ink3 }}><Icon name="search" size={13}/></div>
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search by name, contact, email, state…" style={{
            width:'100%', padding: '6px 10px 6px 30px', borderRadius: 4, border: `1px solid ${TOKENS.ruleStrong}`, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink, outline:'none', background: TOKENS.card,
          }}/>
        </div>
        <FilterChip label="Tier"  value={tier}  active={tier !== 'All'}  options={['All', ...tiers]}  onChange={setTier}/>
        <FilterChip label="State" value={state} active={state !== 'All'} options={['All', ...states]} onChange={setState}/>
        <div style={{ flex:1 }}/>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>Showing {rows.length} of {all.length}</div>
      </div>

      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom:`1px solid ${TOKENS.rule}` }}>
            {['Client','Tier','State','Contact','POs','PO value','Outstanding','On-time %',''].map((h,i) => (
              <th key={i} style={{ padding:'8px 12px', textAlign: i>=4 && i<=7 ? 'right' : 'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={9} style={{ padding: 32, textAlign:'center', fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3 }}>No clients match these filters.</td></tr>
            )}
            {rows.map(c => (
              <tr key={c.id} onClick={() => setOpen(c)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                <td style={{ padding:'10px 12px' }}>
                  <div style={{ fontFamily: FONT.sans, fontSize: 12.5, fontWeight: 500, color: TOKENS.ink }}>{c.name}</div>
                  <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, marginTop: 2 }}>{c.gstin}</div>
                </td>
                <td style={{ padding:'10px 12px' }}><Pill tone={c.tier==='Enterprise'?'accent':c.tier==='Mid-market'?'blue':'ink'} size="sm">{c.tier}</Pill></td>
                <td style={{ padding:'10px 12px', color: TOKENS.ink3, fontSize: 11.5 }}>{c.state}</td>
                <td style={{ padding:'10px 12px' }}>
                  <div style={{ color: TOKENS.ink2, fontSize: 12 }}>{c.contact}</div>
                  <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>{c.phone}</div>
                </td>
                <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, color: TOKENS.ink, fontWeight: 600 }}>{c.pos}</td>
                <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, color: TOKENS.ink, fontWeight: 600 }}>{inr(c.pov)}</td>
                <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, color: c.outstanding>0 ? TOKENS.accentInk : TOKENS.ink3 }}>{inr(c.outstanding)}</td>
                <td style={{ padding:'10px 12px', textAlign:'right' }}>
                  <span style={{ fontFamily: FONT.mono, fontSize: 11, color: c.onTimePayPct >= 85 ? TOKENS.positive : c.onTimePayPct >= 70 ? TOKENS.amber : TOKENS.alert, fontWeight: 600 }}>
                    {c.onTimePayPct}%
                  </span>
                </td>
                <td style={{ padding:'10px 8px', color: TOKENS.ink4 }}><Icon name="chevRight" size={13}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <ClientDetail client={open} onClose={() => setOpen(null)} onAction={(msg) => setToast({ tone:'positive', text: msg })}/>
    </div>
  );
}

    p.client === c.name || p.client.toLowerCase().includes(c.name.split(' ')[0].toLowerCase())
  );
  const clientInvoices = (SEED.invoices || []).filter(i =>

  );

  return (
    <Modal open={!!client} onClose={onClose}
      eyebrow={`${c.tier.toUpperCase()} · CLIENT SINCE ${(c.since || '').slice(0,4)}`}

      width={880}
      actions={<>
        <Btn variant="outline" size="sm" icon="download" onClick={() => onAction(`Generated account statement for ${c.name}.`)}>Statement</Btn>

              <Pill tone={p.wsTone} size="sm" dot>{p.status}</Pill>
              <span style={{ fontFamily: FONT.mono, fontWeight: 600 }}>{inr(p.pov)}</span>

        {clientInvoices.map(iv => (

function RatesRoute() {
  const sk0 = (SEED.wageRates && SEED.wageRates.skills) || [];
  const em0 = (SEED.wageRates && SEED.wageRates.employees) || [];
  const [skills, setSkills] = React.useState(sk0);
  const [emps, setEmps]     = React.useState(em0);
  const [tab, setTab]       = React.useState('skills');
  const [toast, setToast]   = React.useState(null);
  const [editSk, setEditSk] = React.useState(null);
  const [editEm, setEditEm] = React.useState(null);
  const [draftRate, setDraftRate] = React.useState('');

  const headCount = skills.reduce((a,s) => a + (s.headcount || 0), 0);
  const avg = skills.length ? Math.round(skills.reduce((a,s) => a + s.rate, 0) / skills.length) : 0;
  const overridden = emps.filter(e => e.override).length;

  const saveSkillRate = () => {
    const v = parseInt(draftRate, 10);
    if (Number.isNaN(v) || v <= 0) { setToast({ tone:'amber', text:'Enter a positive hourly rate (₹/hour).' }); return; }
    setSkills(skills.map(s => s.id === editSk.id ? { ...s, prevRate: s.rate, rate: v, lastUpdated: '23 Apr 26' } : s));
    setToast({ tone:'positive', text:`${editSk.name} rate updated to ₹${v}/hr. Propagates on next timesheet post.` });
    setEditSk(null); setDraftRate('');
  };

  const saveEmpRate = () => {
    const v = parseInt(draftRate, 10);
    if (Number.isNaN(v) || v <= 0) { setToast({ tone:'amber', text:'Enter a positive hourly rate (₹/hour).' }); return; }
    setEmps(emps.map(e => e.id === editEm.id ? { ...e, rate: v, override: v !== e.base, lastChanged: '23 Apr 26' } : e));
    setToast({ tone:'positive', text:`${editEm.name} rate set to ₹${v}/hr.` });
    setEditEm(null); setDraftRate('');
  };

  const resetEmp = (e) => {
    setEmps(emps.map(x => x.id === e.id ? { ...x, rate: x.base, override: false, lastChanged: '23 Apr 26' } : x));

            const body2 = emps.map(e => ['Employee', e.id, e.name, e.skill, e.rate, e.lastChanged]);
            const csv = [head, ...body1, ...body2].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
            try {
              const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a'); a.href = url; a.download = 'wage-rates.csv';

            <thead><tr style={{ background: TOKENS.paperAlt, borderBottom:`1px solid ${TOKENS.rule}` }}>

        <div style={{ marginTop: 10, fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>
          Change applies to new timesheet posts. Historical entries are preserved at the rate that was effective at the time.
        </div>

      <Modal open={!!editEm} onClose={() => { setEditEm(null); setDraftRate(''); }}

          Skill: <span style={{ color: TOKENS.ink, fontWeight: 600 }}>{editEm && editEm.skill}</span> · Base rate: <span style={{ color: TOKENS.ink, fontWeight: 600 }}>₹{editEm && editEm.base}/hr</span>

        <Field label="Employee rate (₹/hr)" value={draftRate} onChange={(e) => setDraftRate(e.target.value.replace(/[^0-9]/g,''))} placeholder="e.g. 480"/>
        <div style={{ marginTop: 10, fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>
          Setting equal to the skill base removes the override. Setting different flags the employee as <em>custom</em>.

}
