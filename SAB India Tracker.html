function inr(n, { compact = true, short = false } = {}) {
  if (n === null || n === undefined || Number.isNaN(+n)) return '—';
  const abs = Math.abs(+n);
  if (compact) {
    if (abs >= 1e7) return (short ? '' : '₹') + (n/1e7).toFixed(abs >= 1e8 ? 1 : 2) + ' Cr';
    if (abs >= 1e5) return (short ? '' : '₹') + (n/1e5).toFixed(abs >= 1e6 ? 1 : 2) + ' L';
    if (abs >= 1e3) return (short ? '' : '₹') + (n/1e3).toFixed(1) + 'k';
    return (short ? '' : '₹') + Math.round(n);
  }
  const s = Math.round(n).toString();
  const neg = s.startsWith('-') ? '-' : '';
  const d = s.replace('-','');
  let out;
  if (d.length <= 3) out = d;
  else {
    const last3 = d.slice(-3);
    const rest = d.slice(0, -3);
    out = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + ',' + last3;
  }
  return '₹' + neg + out;
}

    kanban: <><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="10" rx="1"/><rect x="17" y="4" width="4" height="13" rx="1"/></>,

function Wordmark({ size = 18, tone = 'ink', showTag = true }) {
  const color = tone === 'ink' ? TOKENS.ink : '#fff';
  const muted = tone === 'ink' ? TOKENS.ink3 : 'rgba(255,255,255,.6)';
  return (
    <div style={{ display:'flex', alignItems:'center', gap: size * 0.55 }}>
      <svg width={size*1.5} height={size*1.5} viewBox="0 0 40 40" style={{ flex:'none' }}>
        <rect x="2" y="2" width="36" height="36" rx="6" fill={TOKENS.accent}/>
        <path d="M11 25c0-4 3-6 7-6s7-2 7-6" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
        <circle cx="11" cy="15" r="2.2" fill="#fff"/>
        <circle cx="29" cy="25" r="2.2" fill="#fff"/>
      </svg>
      <div style={{ lineHeight: 1.05 }}>
        <div style={{ fontFamily: FONT.sans, fontWeight: 700, letterSpacing: '-0.01em', fontSize: size, color }}>
          SAB India <span style={{ fontWeight: 500, color: muted }}>Tracker</span>
        </div>
        {showTag && <div style={{ fontFamily: FONT.mono, fontSize: Math.max(9, size*0.52), color: muted, letterSpacing: '.04em', marginTop: 2 }}>
          Powered by <span style={{ color: TOKENS.accent, fontWeight: 600 }}>indefine</span>
        </div>}
      </div>
    </div>
  );
}

function Pill({ tone = 'ink', size = 'md', children, dot = false, style = {} }) {
  const map = {
    positive: { bg: TOKENS.positiveWash, fg: TOKENS.positive, dot: TOKENS.positive },
    alert:    { bg: TOKENS.alertWash,    fg: TOKENS.alert,    dot: TOKENS.alert },
    amber:    { bg: TOKENS.amberWash,    fg: 'oklch(0.5 0.14 70)', dot: TOKENS.amber },
    blue:     { bg: TOKENS.blueWash,     fg: TOKENS.blue,     dot: TOKENS.blue },
    accent:   { bg: TOKENS.accentWash,   fg: TOKENS.accentInk, dot: TOKENS.accent },
    ink:      { bg: TOKENS.paperAlt,     fg: TOKENS.ink2,     dot: TOKENS.ink3 },
  };
  const t = map[tone] || map.ink;
  const pad = size === 'sm' ? '1px 6px' : '2px 8px';
  const fs = size === 'sm' ? 10 : 11;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      padding: pad, borderRadius: 3,
      background: t.bg, color: t.fg,
      fontFamily: FONT.mono, fontSize: fs, fontWeight: 500,
      letterSpacing: '.03em', textTransform:'uppercase',
      border: `1px solid ${t.fg}22`,
      ...style
    }}>
      {dot && <span style={{ width:5, height:5, borderRadius:5, background: t.dot }}/>}
      {children}
    </span>
  );
}

function Code({ children, style={} }) {
  return <span style={{ fontFamily: FONT.mono, fontSize: 11, fontWeight: 500, color: TOKENS.accentInk, letterSpacing:'.01em', ...style }}>{children}</span>;
}

function KPI({ label, value, sub, trend, accent = false, spark, onClick, active=false }) {
  return (
    <div onClick={onClick} style={{
      background: accent ? TOKENS.accentWash : TOKENS.card,
      border: `1px solid ${active ? TOKENS.accent : TOKENS.rule}`,
      borderRadius: 4,
      padding: '14px 16px',
      cursor: onClick ? 'pointer' : 'default',
      position: 'relative',
      transition: 'border-color .15s',
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 9.5, fontWeight: 600, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase' }}>{label}</div>
        {trend !== undefined && (
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: trend >= 0 ? TOKENS.positive : TOKENS.alert, fontWeight: 600 }}>
            {trend >= 0 ? '+' : ''}{trend}%
          </div>
        )}
      </div>
      <div style={{ fontFamily: FONT.sans, fontSize: 24, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.02em', marginTop: 6, fontVariantNumeric:'tabular-nums' }}>
        {value}
      </div>
      {sub && <div style={{ fontFamily: FONT.sans, fontSize: 11.5, color: TOKENS.ink3, marginTop: 3 }}>{sub}</div>}
      {spark && <div style={{ marginTop: 10 }}>{spark}</div>}
    </div>
  );
}

function Sparkbars({ values, height = 28, color = TOKENS.accent, gap = 2 }) {
  const max = Math.max(1, ...values);
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap, height }}>
      {values.map((v,i) => (
        <div key={i} style={{
          flex:1, height: `${Math.max(2, (v/max)*100)}%`,
          background: color, opacity: 0.35 + (v/max)*0.65,
          borderRadius: '1px 1px 0 0'
        }}/>
      ))}
    </div>
  );
}

function Sparkline({ values, width=120, height=28, color = TOKENS.accent, fill = true }) {
  if (!values || !values.length) return null;
  const max = Math.max(...values), min = Math.min(...values);
  const range = max - min || 1;
  const pts = values.map((v,i) => {
    const x = (i/(values.length-1)) * width;
    const y = height - ((v - min)/range) * height;
    return [x, y];
  });
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = path + ` L ${width} ${height} L 0 ${height} Z`;
  return (
    <svg width={width} height={height} style={{ display:'block' }}>
      {fill && <path d={area} fill={color} opacity=".12"/>}
      <path d={path} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
}

function Btn({ variant='default', size='md', children, onClick, icon, style={}, disabled=false }) {
  const base = {
    display:'inline-flex', alignItems:'center', gap: 6,
    fontFamily: FONT.sans, fontWeight: 500,
    fontSize: size === 'sm' ? 12 : 13,
    padding: size === 'sm' ? '5px 10px' : '7px 14px',
    borderRadius: 4,
    cursor: disabled ? 'not-allowed' : 'pointer',
    transition: 'all .12s',
    border: '1px solid transparent',
    letterSpacing:'-0.005em',
    opacity: disabled ? 0.5 : 1,
    ...style
  };
  const variants = {
    default:  { background: TOKENS.ink, color: '#fff', borderColor: TOKENS.ink },
    primary:  { background: TOKENS.accent, color: '#fff', borderColor: TOKENS.accent },
    outline:  { background: TOKENS.card, color: TOKENS.ink, borderColor: TOKENS.ruleStrong },
    ghost:    { background: 'transparent', color: TOKENS.ink2, borderColor: 'transparent' },
    subtle:   { background: TOKENS.paperAlt, color: TOKENS.ink, borderColor: TOKENS.rule },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant] }}>
      {icon && <Icon name={icon} size={size === 'sm' ? 13 : 14}/>}
      {children}
    </button>
  );
}

function PageHeader({ eyebrow, title, description, actions, tabs }) {
  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 24 }}>
        <div>
          {eyebrow && <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 6 }}>{eyebrow}</div>}
          <h1 style={{ fontFamily: FONT.sans, fontSize: 26, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.025em', margin: 0, lineHeight: 1.15 }}>{title}</h1>
          {description && <div style={{ fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3, marginTop: 6, maxWidth: 640 }}>{description}</div>}
        </div>
        {actions && <div style={{ display:'flex', alignItems:'center', gap: 8, flex:'none' }}>{actions}</div>}
      </div>
      {tabs && <div style={{ marginTop: 20, borderBottom: `1px solid ${TOKENS.rule}` }}>{tabs}</div>}
    </div>
  );
}

function Tabs({ items, active, onChange }) {
  return (
    <div style={{ display:'flex', gap: 2 }}>
      {items.map(it => {
        const isActive = it.key === active;
        return (
          <button key={it.key} onClick={() => onChange && onChange(it.key)} style={{
            padding: '10px 14px',
            fontFamily: FONT.sans, fontSize: 13, fontWeight: isActive ? 600 : 500,
            color: isActive ? TOKENS.ink : TOKENS.ink3,
            background: 'transparent', border: 'none',
            borderBottom: `2px solid ${isActive ? TOKENS.accent : 'transparent'}`,
            marginBottom: -1, cursor: 'pointer',
            display:'inline-flex', alignItems:'center', gap: 7,
          }}>
            {it.label}
            {it.count !== undefined && (
              <span style={{ fontFamily: FONT.mono, fontSize: 10, padding:'1px 6px', borderRadius: 3, background: isActive ? TOKENS.accentWash : TOKENS.paperAlt, color: isActive ? TOKENS.accentInk : TOKENS.ink3 }}>{it.count}</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

// ─── Inline notice / toast ─────────────────────────────────────
function Notice({ tone='positive', children, onClose }) {
  const c = TOKENS[tone] || TOKENS.positive;
  return (
    <div style={{
      display:'flex', alignItems:'center', gap: 10,
      padding:'9px 12px', marginBottom: 14,
      background: `color-mix(in oklch, ${c} 8%, ${TOKENS.card})`,
      border: `1px solid color-mix(in oklch, ${c} 35%, ${TOKENS.rule})`,
      borderRadius: 4, fontFamily: FONT.sans, fontSize: 12.5, color: TOKENS.ink,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 999, background: c, flex:'none' }}/>
      <div style={{ flex: 1 }}>{children}</div>
      {onClose && (
        <button onClick={onClose} aria-label="Dismiss" style={{
          background:'transparent', border:'none', cursor:'pointer',
          color: TOKENS.ink3, fontSize: 16, lineHeight: 1, padding: 0,
        }}>×</button>
      )}
    </div>
  );
}

// ─── Modal shell ───────────────────────────────────────────────
function Modal({ open, onClose, title, eyebrow, actions, children, width = 720 }) {
  React.useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed', inset: 0, background:'rgba(20,18,14,.45)', zIndex: 100,
      display:'flex', alignItems:'flex-start', justifyContent:'center', padding:'48px 24px', overflowY:'auto',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: TOKENS.card, borderRadius: 6, width:'100%', maxWidth: width,
        boxShadow:'0 24px 60px rgba(0,0,0,.25)', overflow:'hidden',
      }}>
        <div style={{ padding:'18px 24px', borderBottom:`1px solid ${TOKENS.rule}`, display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 16 }}>
          <div>
            {eyebrow && <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 4 }}>{eyebrow}</div>}
            <div style={{ fontFamily: FONT.sans, fontSize: 18, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.02em' }}>{title}</div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
            {actions}
            <button onClick={onClose} style={{ background:'transparent', border:`1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 6, cursor:'pointer', color: TOKENS.ink3 }}><Icon name="x" size={14}/></button>
          </div>
        </div>
        <div style={{ padding:'20px 24px' }}>{children}</div>
      </div>
    </div>
  );
}

Object.assign(window, { TOKENS, FONT, Icon, Wordmark, Pill, Code, KPI, Sparkbars, Sparkline, Btn, PageHeader, Tabs, inr, Notice, Modal });

// ═══ seed.jsx ═══
const SEED = {

  const [supervisor, setSup]    = React.useState('All');

  const [desc, setDesc]         = React.useState('All descriptions');
  const [fy, setFy]             = React.useState('FY 25-26');

  const statuses    = React.useMemo(() => Array.from(new Set(all.map(r => r.status))).sort(), [all]);
  const fyMatches = (code, fyLabel) => {
    if (fyLabel === 'All FYs') return true;
    const m = fyLabel.match(/(\d{2})-(\d{2})/);
    if (!m) return true;
    const yy = m[1];
    return code.startsWith(`SAB-${yy}-`);

      const q = query.toLowerCase();

    if (status !== 'All' && r.status !== status) return false;
    if (supervisor !== 'All' && r.sup !== supervisor) return false;
    if (needsBilling && r.billed >= r.pov) return false;
    if (desc !== 'All descriptions' && r.desc !== desc) return false;
    if (!fyMatches(r.code, fy)) return false;
    return true;
  }), [all, query, status, supervisor, needsBilling, desc, fy]);

  const totalPo = rows.reduce((a,r)=>a+r.pov,0);

    setToast({ tone:'positive', text:`Exported ${rows.length} projects to projects-${fy.replace(/\s/g,'')}.csv (preview).` });
    if (typeof Blob !== 'undefined' && typeof URL !== 'undefined' && typeof document !== 'undefined') {
      try {
        const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `projects-${fy.replace(/\s/g,'')}.csv`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);

      />

      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.text}</Notice>}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 16, marginBottom: 16 }}>
        <KPI label="Total PO Value" value={inr(totalPo)} sub={`${rows.length} POs · inc GST`} accent/>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap: 10, marginBottom: 16 }}>

function PillFilter({ label, value, active = false, options, onChange }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(v => !v)} style={{
        display:'inline-flex', alignItems:'center', gap: 6,
        padding:'5px 10px',
        border:`1px solid ${active ? TOKENS.accent : TOKENS.ruleStrong}`,
        background: active ? TOKENS.accentWash : TOKENS.card,
        borderRadius: 4,
        fontFamily: FONT.sans, fontSize: 12,
        color: active ? TOKENS.accentInk : TOKENS.ink2,
        cursor:'pointer',
      }}>
        <span style={{ color: TOKENS.ink3, fontWeight: 500 }}>{label}:</span>
        <span style={{ fontWeight: 600 }}>{value}</span>
        <Icon name="chevDown" size={11}/>
      </button>
      {open && options && (
        <div style={{
          position:'absolute', top:'100%', left: 0, marginTop: 4, zIndex: 50,
          background: TOKENS.card, border: `1px solid ${TOKENS.ruleStrong}`, borderRadius: 4,
          minWidth: 200, maxHeight: 280, overflowY:'auto',
          boxShadow: '0 6px 20px rgba(0,0,0,.08)'
        }}>
          {options.map(o => (
            <button key={o} onClick={() => { onChange && onChange(o); setOpen(false); }} style={{
              display:'block', width:'100%', textAlign:'left',
              padding:'7px 12px', background: o === value ? TOKENS.accentWash : 'transparent',
              border:'none', cursor:'pointer',
              fontFamily: FONT.sans, fontSize: 12,
              color: o === value ? TOKENS.accentInk : TOKENS.ink,
            }}>{o}</button>
          ))}
        </div>
      )}
    </div>
  );
}

Object.assign(window, { ProjectsRoute, PillFilter });
</script>

                background: bg,
                color: fg,
                borderRadius: 3,
                fontFamily: FONT.sans, fontSize: 12, fontWeight: 600,
                position:'relative',
                clipPath: i === stages.length - 1 ? 'none' : 'polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%)',
                paddingLeft: i === 0 ? 12 : 16,
              }}>
                <div style={{ fontFamily: FONT.mono, fontSize: 9.5, letterSpacing:'.08em', opacity: .85, fontWeight: 500 }}>0{i+1}</div>
                <div style={{ fontSize: 12.5, marginTop: 2 }}>{s.k}</div>
              </div>
              <div style={{ padding: '6px 10px 0', fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>
                {s.start}–{s.end} · <span style={{ color: done ? TOKENS.positive : now ? TOKENS.accentInk : TOKENS.ink3, fontWeight: 600 }}>{s.pct}%</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ marginTop: 20, padding: 12, background: TOKENS.paperAlt, borderRadius: 3, display:'flex', gap: 16, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>
        <span><span style={{ fontWeight: 600, color: TOKENS.ink }}>Now:</span> Install — 12 of 18 hydrant points wet-tested, phase 2 pipe routing in progress</span>
      </div>
    </div>
  );
}

function PnlWaterfall({ p }) {
  const max = p.revenue;
  const rows = [
    { k:'Revenue',      v: p.revenue,      fg: TOKENS.positive, sign: '+' },
    { k:'Labor',        v: -p.labor,       fg: TOKENS.ink2,     sign: '−' },
    { k:'Material',     v: -p.material,    fg: TOKENS.ink2,     sign: '−' },
    { k:'Other',        v: -p.other,       fg: TOKENS.ink2,     sign: '−' },
    { k:'Contribution', v: p.contribution, fg: TOKENS.positive, sign: '=' },
    { k:'Overhead',     v: -p.overhead,    fg: TOKENS.ink2,     sign: '−' },
    { k:'Net P&L',      v: p.net,          fg: TOKENS.accentInk, sign: '=' , bold:true },
  ];
  return (
    <div>
      <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, marginBottom: 8 }}>P&amp;L waterfall</div>
      {rows.map((r, i) => {
        const w = Math.abs(r.v) / max * 100;
        return (
          <div key={i} style={{ display:'flex', alignItems:'center', gap: 8, padding: '4px 0' }}>
            <span style={{ width: 12, fontFamily: FONT.mono, fontSize: 11, color: r.fg }}>{r.sign}</span>
            <span style={{ width: 90, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink2, fontWeight: r.bold ? 600 : 500 }}>{r.k}</span>
            <div style={{ flex:1, height: r.bold ? 12 : 8, background: TOKENS.paperAlt, borderRadius: 2, overflow:'hidden' }}>
              <div style={{ width: `${w}%`, height:'100%', background: r.fg, opacity: r.bold ? 1 : 0.75 }}/>
            </div>
            <span style={{ fontFamily: FONT.mono, fontSize: 11, color: TOKENS.ink, fontWeight: r.bold ? 600 : 500, minWidth: 70, textAlign:'right' }}>{inr(Math.abs(r.v))}</span>
          </div>
        );
      })}
    </div>
  );
}

function CostBreakdown({ p }) {
  const total = p.labor + p.material + p.other + p.overhead;
  const parts = [
    { k:'Material', v: p.material, c: TOKENS.accent },
    { k:'Labor',    v: p.labor,    c: TOKENS.blue },
    { k:'Overhead', v: p.overhead, c: TOKENS.ink },
    { k:'Other',    v: p.other,    c: TOKENS.amber },
  ];
  return (
    <div>
      <div style={{ display:'flex', height: 10, borderRadius: 2, overflow:'hidden', marginBottom: 10 }}>
        {parts.map((p, i) => <div key={i} style={{ width: `${p.v/total*100}%`, background: p.c }}/>)}
      </div>
      {parts.map((p, i) => (
        <div key={i} style={{ display:'flex', justifyContent:'space-between', padding: '4px 0', fontFamily: FONT.sans, fontSize: 12 }}>
          <div style={{ display:'flex', alignItems:'center', gap: 7, color: TOKENS.ink2 }}>
            <span style={{ width: 8, height: 8, background: p.c, borderRadius: 2 }}/>
            {p.k}
          </div>
          <div style={{ fontFamily: FONT.mono, color: TOKENS.ink }}>
            {inr(p.v)} <span style={{ color: TOKENS.ink3, fontSize: 10.5 }}>· {(p.v/total*100).toFixed(1)}%</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function LedgerList({ rows }) {
  return (
    <div>
      {rows.map((r, i) => {
        const icon = { Invoice:'invoice', 'Stock issue':'box', Timesheet:'clock', Purchase:'truck', Transfer:'arrowRight' }[r.k] || 'menu';
        return (
          <div key={i} style={{ display:'flex', alignItems:'center', gap: 12, padding:'10px 0', borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
            <div style={{ width: 28, height: 28, borderRadius: 4, background: TOKENS.paperAlt, display:'flex', alignItems:'center', justifyContent:'center', color: TOKENS.ink3, flex:'none' }}>
              <Icon name={icon} size={14}/>
            </div>
            <div style={{ flex:1, minWidth: 0 }}>
              <div style={{ fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink, fontWeight: 500 }}>{r.desc}</div>
              <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3, marginTop: 1 }}>{r.k} · {r.d}</div>
            </div>
            <div style={{ fontFamily: FONT.mono, fontSize: 12.5, fontWeight: 600, color: r.tone === 'positive' ? TOKENS.positive : r.tone === 'alert' ? TOKENS.alert : TOKENS.ink3 }}>
              {r.amt === 0 ? '—' : (r.amt > 0 ? '+' : '') + inr(r.amt)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function BillingProgress({ p }) {
  const billedPct = (p.billed / p.pov) * 100;
  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 8 }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>Contract progress</div>
        <div style={{ fontFamily: FONT.mono, fontSize: 11, color: TOKENS.ink, fontWeight: 600 }}>{billedPct.toFixed(1)}% billed</div>
      </div>
      <div style={{ height: 10, background: TOKENS.paperAlt, borderRadius: 2, overflow:'hidden', display:'flex' }}>
        <div style={{ width: `${billedPct}%`, background: TOKENS.positive }}/>
        <div style={{ width: `${100 - billedPct}%`, background: TOKENS.accent, opacity: .3 }}/>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap: 10, marginTop: 14 }}>
        <div>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>Billed</div>
          <div style={{ fontFamily: FONT.sans, fontSize: 16, fontWeight: 600, color: TOKENS.positive, fontVariantNumeric:'tabular-nums' }}>{inr(p.billed)}</div>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>4 invoices · last 08 Apr</div>
        </div>
        <div>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>To bill</div>
          <div style={{ fontFamily: FONT.sans, fontSize: 16, fontWeight: 600, color: TOKENS.accentInk, fontVariantNumeric:'tabular-nums' }}>{inr(p.outstanding)}</div>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>next milestone · 28 May</div>
        </div>
      </div>
      <Btn variant="outline" size="sm" icon="plus" style={{ marginTop: 14, width:'100%', justifyContent:'center' }}>Raise progress invoice</Btn>
    </div>
  );
}

function SiteActivity() {
  const rows = [
    { emp:'R. Naidu',  status:'on-site', dur:'4h 18m', dot: TOKENS.positive },
    { emp:'P. Rao',    status:'on-site', dur:'3h 05m', dot: TOKENS.positive },
    { emp:'S. Iyer',   status:'punched out', dur:'9h 42m', dot: TOKENS.ink3 },
    { emp:'M. Varma',  status:'punched out', dur:'8h 10m', dot: TOKENS.ink3 },
  ];
  return (
    <div>
      {rows.map((r, i) => (
        <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding: '7px 0', borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
          <div style={{ display:'flex', alignItems:'center', gap: 9 }}>
            <span style={{ width: 7, height: 7, borderRadius: 7, background: r.dot }}/>
            <div>
              <div style={{ fontFamily: FONT.sans, fontSize: 12.5, color: TOKENS.ink, fontWeight: 500 }}>{r.emp}</div>
              <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>{r.status}</div>
            </div>
          </div>
          <div style={{ fontFamily: FONT.mono, fontSize: 11.5, color: TOKENS.ink2, fontWeight: 500 }}>{r.dur}</div>
        </div>
      ))}

}

function DetailRows({ p }) {
  const rows = [
    ['Project code', p.code],

function PnlTab({ p }) {

function ProgressTab({ p }) {

}

function Placeholder({ label }) {
  return <div style={{ background: TOKENS.card, border: `1px dashed ${TOKENS.ruleStrong}`, borderRadius: 4, padding: 48, textAlign:'center', color: TOKENS.ink3, fontFamily: FONT.sans, fontSize: 13 }}>
    <div style={{ fontFamily: FONT.mono, fontSize: 11, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, color: TOKENS.ink3 }}>{label} tab</div>

Object.assign(window, { ProjectDetailRoute, Card, StatBlock, StageTimeline, PnlWaterfall, CostBreakdown, LedgerList, BillingProgress, SiteActivity, DetailRows, PnlTab, ProgressTab, LedgerTab, Placeholder, OverviewTab });
</script>

<script type="text/babel" data-presets="react">
// SAB — Invoices, Quotes, Inventory, Timesheets, Reports routes (compact)

const INVOICE_STATUS_TONE = { ISSUED:'blue', PAID:'positive', DRAFT:'ink', OVERDUE:'alert' };
const QUOTE_STATUS_TONE   = { DRAFT:'ink', SENT:'blue', NEGOTIATING:'amber', CHANGES_REQUESTED:'amber', ACCEPTED:'positive', CONVERTED:'positive', LOST:'alert' };

function FilterChip({ label, value, active, options, onChange }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        display:'inline-flex', alignItems:'center', gap: 6, padding:'5px 10px',
        border:`1px solid ${active ? TOKENS.accent : TOKENS.ruleStrong}`,
        background: active ? TOKENS.accentWash : TOKENS.card,
        borderRadius: 4, fontFamily: FONT.sans, fontSize: 12,
        color: active ? TOKENS.accentInk : TOKENS.ink2, cursor:'pointer',
      }}>
        <span style={{ color: TOKENS.ink3, fontWeight: 500 }}>{label}:</span>
        <span style={{ fontWeight: 600 }}>{value}</span>
        <Icon name="chevDown" size={11}/>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'100%', left:0, marginTop: 4, zIndex: 50, background: TOKENS.card, border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, minWidth: 180, maxHeight: 280, overflowY:'auto', boxShadow:'0 6px 20px rgba(0,0,0,.08)' }}>
          {options.map(o => (
            <button key={o} onClick={() => { onChange && onChange(o); setOpen(false); }} style={{ display:'block', width:'100%', textAlign:'left', padding:'7px 12px', background: o===value?TOKENS.accentWash:'transparent', border:'none', cursor:'pointer', fontFamily: FONT.sans, fontSize: 12, color: o===value?TOKENS.accentInk:TOKENS.ink }}>{o}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function InvoicesRoute() {
  const all = SEED.invoices;
  const [query, setQuery]   = React.useState('');
  const [status, setStatus] = React.useState('All');
  const [kind, setKind]     = React.useState('All');
  const [open, setOpen]     = React.useState(null);
  const [toast, setToast]   = React.useState(null);
  const [draft, setDraft]   = React.useState(false);
  const [draftRow, setDraftRow] = React.useState({ client:'', pc:'', kind:'PROGRESS', amt:'' });

  const statuses = React.useMemo(() => Array.from(new Set(all.map(r => r.status))).sort(), [all]);
  const kinds    = React.useMemo(() => Array.from(new Set(all.map(r => r.kind))).sort(), [all]);

  const rows = React.useMemo(() => all.filter(r => {
    if (query && ![r.no, r.client, r.pc].some(v => v && v.toLowerCase().includes(query.toLowerCase()))) return false;
    if (status !== 'All' && r.status !== status) return false;
    if (kind !== 'All' && r.kind !== kind) return false;
    return true;
  }), [all, query, status, kind]);

  const totals = {
    issued: rows.filter(r=>r.status==='ISSUED').reduce((a,r)=>a+r.amt,0),
    paid:   rows.filter(r=>r.status==='PAID').reduce((a,r)=>a+r.amt,0),
    draft:  rows.filter(r=>r.status==='DRAFT').reduce((a,r)=>a+r.amt,0),
  };

  const exportCsv = () => {
    const head = ['Invoice','Type','Client','Project','Amount','Status','Issued','Due'];
    const body = rows.map(r => [r.no, r.kind, r.client, r.pc, r.amt, r.status, r.issuedAt, r.due]);
    const csv = [head, ...body].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    try {
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `invoices.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) {}
    setToast({ tone:'positive', text:`Exported ${rows.length} invoice${rows.length===1?'':'s'} to invoices.csv.` });
  };

  const submitDraft = () => {
    if (!draftRow.client || !draftRow.pc || !draftRow.amt) {
      setToast({ tone:'amber', text:'Client, project code and amount are required to save a draft.' });
      return;
    }
    setToast({ tone:'positive', text:`Draft invoice saved for ${draftRow.client} (${inr(Number(draftRow.amt) || 0)}). It will appear once the local store sync runs.` });
    setDraft(false);
    setDraftRow({ client:'', pc:'', kind:'PROGRESS', amt:'' });
  };

  return (
    <div style={{ padding: '24px 28px' }}>
      <PageHeader eyebrow="Billing" title="Tax invoices"
        description="Generate from PO, stamp with invoice number, hand to client. All invoices are GST compliant."
        actions={<>
          <Btn variant="outline" size="sm" icon="download" onClick={exportCsv}>Export</Btn>
          <Btn variant="primary" size="sm" icon="plus" onClick={() => setDraft(true)}>New invoice</Btn>
        </>}/>

      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.text}</Notice>}

      {draft && (
        <div style={{ background: TOKENS.card, border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, padding: 16, marginBottom: 14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 12 }}>
            <div style={{ fontFamily: FONT.sans, fontSize: 14, fontWeight: 600, color: TOKENS.ink }}>New tax invoice — draft</div>
            <button onClick={() => setDraft(false)} style={{ background:'transparent', border:`1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 5, cursor:'pointer', color: TOKENS.ink3 }}><Icon name="x" size={12}/></button>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'2fr 1.4fr 1fr 1fr', gap: 10 }}>
            <Field label="Client name"      value={draftRow.client} onChange={(e) => setDraftRow({...draftRow, client:e.target.value})} placeholder="e.g. Apollo Hospitals"/>
            <Field label="Project code"     value={draftRow.pc}     onChange={(e) => setDraftRow({...draftRow, pc:e.target.value})}     placeholder="SAB-26-XXXX"/>
            <FieldSelect label="Type" value={draftRow.kind}        onChange={(e) => setDraftRow({...draftRow, kind:e.target.value})}>
              <option>PROGRESS</option><option>ADVANCE</option><option>FINAL</option><option>ADHOC</option>
            </FieldSelect>
            <Field label="Amount (₹)"       value={draftRow.amt}    onChange={(e) => setDraftRow({...draftRow, amt:e.target.value.replace(/[^0-9.]/g,'')})} placeholder="e.g. 4820000"/>
          </div>
          <div style={{ marginTop: 12, display:'flex', justifyContent:'flex-end', gap: 8 }}>
            <Btn variant="outline" size="sm" onClick={() => setDraft(false)}>Cancel</Btn>
            <Btn variant="primary" size="sm" icon="check" onClick={submitDraft}>Save draft</Btn>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 16 }}>
        <KPI label="Issued (awaiting payment)" value={inr(totals.issued)} sub={`${rows.filter(r=>r.status==='ISSUED').length} invoices`} accent/>
        <KPI label="Paid this FY" value={inr(totals.paid)} sub={`${rows.filter(r=>r.status==='PAID').length} invoices`}/>
        <KPI label="Drafts" value={inr(totals.draft)} sub={`${rows.filter(r=>r.status==='DRAFT').length} invoices`}/>
        <KPI label="Avg. collection time" value="38 days" sub="↓ 4 days vs. last FY" trend={-4}/>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 10, flexWrap:'wrap' }}>
        <div style={{ position:'relative', flex:1, maxWidth: 360 }}>
          <div style={{ position:'absolute', left: 10, top: 8, color: TOKENS.ink3 }}><Icon name="search" size={13}/></div>
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search invoice #, client, project…" style={{
            width:'100%', padding: '6px 10px 6px 30px', borderRadius: 4, border: `1px solid ${TOKENS.ruleStrong}`, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink, outline:'none', background: TOKENS.card,
          }}/>
        </div>
        <FilterChip label="Status" value={status} active={status!=='All'} options={['All', ...statuses]} onChange={setStatus}/>
        <FilterChip label="Type"   value={kind}   active={kind!=='All'}   options={['All', ...kinds]}   onChange={setKind}/>
        <div style={{ flex:1 }}/>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>Showing {rows.length} of {all.length}</div>
      </div>

      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['Invoice #','Type','Client','Project','Amount','Status','Issued','Due',''].map((h,i)=>(
              <th key={i} style={{ padding:'8px 12px', textAlign: i===4?'right':'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={9} style={{ padding: 32, textAlign:'center', fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3 }}>No invoices match these filters.</td></tr>
            )}
            {rows.map((r,i)=>(
              <tr key={i} onClick={() => setOpen(r)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                <td style={{ padding:'10px 12px' }}><Code>{r.no}</Code></td>
                <td style={{ padding:'10px 12px' }}><Pill tone="ink" size="sm">{r.kind}</Pill></td>
                <td style={{ padding:'10px 12px', color: TOKENS.ink, fontWeight:500 }}>{r.client}</td>
                <td style={{ padding:'10px 12px' }}><Code style={{ color: TOKENS.ink3 }}>{r.pc}</Code></td>
                <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, fontWeight:600, color: TOKENS.ink }}>{inr(r.amt)}</td>
                <td style={{ padding:'10px 12px' }}><Pill tone={INVOICE_STATUS_TONE[r.status]} size="sm" dot>{r.status}</Pill></td>
                <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{r.issuedAt}</td>
                <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{r.due}</td>
                <td style={{ padding:'10px 8px', color: TOKENS.ink4 }}><Icon name="chevRight" size={13}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <InvoiceDetail invoice={open} onClose={() => setOpen(null)} onAction={(msg) => setToast({ tone:'positive', text: msg })}/>
    </div>
  );
}

function InvoiceDetail({ invoice, onClose, onAction }) {
  if (!invoice) return null;
  const r = invoice;
  const subtotal = Math.round(r.amt / 1.18);
  const cgst = Math.round((r.amt - subtotal) / 2);
  const sgst = (r.amt - subtotal) - cgst;
  const lines = [
    { d:'Material — pipes, fittings, valves', q: 1, u:'lot', rate: Math.round(subtotal*0.62), amt: Math.round(subtotal*0.62) },

function QuotesRoute() {
  const all = SEED.quotes;
  const [query, setQuery]   = React.useState('');
  const [status, setStatus] = React.useState('All');
  const [open, setOpen]     = React.useState(null);
  const [toast, setToast]   = React.useState(null);
  const [draft, setDraft]   = React.useState(false);
  const [draftRow, setDraftRow] = React.useState({ title:'', client:'', amt:'' });

  const statuses = React.useMemo(() => Array.from(new Set(all.map(r => r.status))).sort(), [all]);

  const rows = React.useMemo(() => all.filter(r => {
    if (query && ![r.no, r.title, r.client].some(v => v && v.toLowerCase().includes(query.toLowerCase()))) return false;
    if (status !== 'All' && r.status !== status) return false;
    return true;
  }), [all, query, status]);

  const exportCsv = () => {
    const head = ['Quote','Title','Client','Amount','Status','Valid until'];
    const body = rows.map(r => [r.no, r.title, r.client, r.amt, r.status, r.valid]);
    const csv = [head, ...body].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    try {
      const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'quotes.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch(e) {}
    setToast({ tone:'positive', text:`Exported ${rows.length} quote${rows.length===1?'':'s'} to quotes.csv.` });
  };

  const submitDraft = () => {
    if (!draftRow.title || !draftRow.client || !draftRow.amt) {
      setToast({ tone:'amber', text:'Title, client and amount are required.' });
      return;
    }
    setToast({ tone:'positive', text:`Draft quote created for ${draftRow.client} (${inr(Number(draftRow.amt) || 0)}). Open it to add line items.` });
    setDraft(false);
    setDraftRow({ title:'', client:'', amt:'' });
  };

  return (
    <div style={{ padding:'24px 28px' }}>
      <PageHeader eyebrow="Sales" title="Quotes"
        description="Draft → Sent → Negotiating → Accepted → Converted to PO. All lineage tracked."
        actions={<>
          <Btn variant="outline" size="sm" icon="download" onClick={exportCsv}>Export</Btn>
          <Btn variant="primary" size="sm" icon="plus" onClick={() => setDraft(true)}>New quote</Btn>
        </>}/>

      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.text}</Notice>}

      {draft && (
        <div style={{ background: TOKENS.card, border:`1px solid ${TOKENS.ruleStrong}`, borderRadius: 4, padding: 16, marginBottom: 14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 12 }}>
            <div style={{ fontFamily: FONT.sans, fontSize: 14, fontWeight: 600 }}>New quote — draft</div>
            <button onClick={() => setDraft(false)} style={{ background:'transparent', border:`1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 5, cursor:'pointer', color: TOKENS.ink3 }}><Icon name="x" size={12}/></button>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'2fr 1.5fr 1fr', gap: 10 }}>
            <Field label="Title"     value={draftRow.title}  onChange={(e) => setDraftRow({...draftRow, title:e.target.value})}  placeholder="e.g. Fire hydrant — Tower 4 & 5"/>
            <Field label="Client"    value={draftRow.client} onChange={(e) => setDraftRow({...draftRow, client:e.target.value})} placeholder="e.g. Brigade Enterprises"/>
            <Field label="Amount (₹)" value={draftRow.amt}    onChange={(e) => setDraftRow({...draftRow, amt:e.target.value.replace(/[^0-9.]/g,'')})} placeholder="48000000"/>
          </div>
          <div style={{ marginTop: 12, display:'flex', justifyContent:'flex-end', gap: 8 }}>
            <Btn variant="outline" size="sm" onClick={() => setDraft(false)}>Cancel</Btn>
            <Btn variant="primary" size="sm" icon="check" onClick={submitDraft}>Save draft</Btn>
          </div>
        </div>
      )}

      <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap: 12, marginBottom: 16 }}>
        <KPI label="Open pipeline" value={inr(rows.filter(r=>['SENT','NEGOTIATING','CHANGES_REQUESTED'].includes(r.status)).reduce((a,r)=>a+r.amt,0))} sub={`${rows.filter(r=>['SENT','NEGOTIATING','CHANGES_REQUESTED'].includes(r.status)).length} quotes active`}/>
        <KPI label="Accepted · FY"  value={inr(rows.filter(r=>r.status==='ACCEPTED').reduce((a,r)=>a+r.amt,0))} sub={`${rows.filter(r=>r.status==='ACCEPTED').length} quotes`} trend={22}/>
        <KPI label="Converted · FY" value={inr(rows.filter(r=>r.status==='CONVERTED').reduce((a,r)=>a+r.amt,0))} sub="→ PO · 18 projects"/>
        <KPI label="Win rate · 12M" value="68%" sub="+5 pts vs. prior" trend={8} accent/>
        <KPI label="Avg. cycle"     value="14 days" sub="Quote → PO"/>
      </div>

      <div style={{ display:'flex', alignItems:'center', gap: 8, marginBottom: 10, flexWrap:'wrap' }}>
        <div style={{ position:'relative', flex:1, maxWidth: 360 }}>
          <div style={{ position:'absolute', left: 10, top: 8, color: TOKENS.ink3 }}><Icon name="search" size={13}/></div>
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search quote #, title, client…" style={{
            width:'100%', padding: '6px 10px 6px 30px', borderRadius: 4, border: `1px solid ${TOKENS.ruleStrong}`, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink, outline:'none', background: TOKENS.card,
          }}/>
        </div>
        <FilterChip label="Status" value={status} active={status!=='All'} options={['All', ...statuses]} onChange={setStatus}/>
        <div style={{ flex:1 }}/>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3 }}>Showing {rows.length} of {all.length}</div>
      </div>

      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['Quote #','Title','Client','Amount','Status','Valid until',''].map((h,i)=>(
              <th key={i} style={{ padding:'8px 12px', textAlign: i===3?'right':'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={7} style={{ padding: 32, textAlign:'center', fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3 }}>No quotes match these filters.</td></tr>
            )}
            {rows.map((r,i)=>(
              <tr key={i} onClick={() => setOpen(r)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                <td style={{ padding:'10px 12px' }}><Code>{r.no}</Code></td>
                <td style={{ padding:'10px 12px', color: TOKENS.ink, fontWeight:500 }}>{r.title}</td>
                <td style={{ padding:'10px 12px', color: TOKENS.ink2 }}>{r.client}</td>
                <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, fontWeight:600, color: TOKENS.ink }}>{inr(r.amt)}</td>
                <td style={{ padding:'10px 12px' }}><Pill tone={QUOTE_STATUS_TONE[r.status]} size="sm" dot>{r.status.replace('_',' ')}</Pill></td>
                <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{r.valid}</td>
                <td style={{ padding:'10px 8px', color: TOKENS.ink4 }}><Icon name="chevRight" size={13}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <QuoteDetail quote={open} onClose={() => setOpen(null)} onAction={(msg) => setToast({ tone:'positive', text: msg })}/>
    </div>
  );
}

function QuoteDetail({ quote, onClose, onAction }) {
  if (!quote) return null;
  const r = quote;
  const subtotal = Math.round(r.amt / 1.18);
  const gst = r.amt - subtotal;
  const lines = [
    { d:'Material supply (per BoQ)',          q: 1, u:'lot', rate: Math.round(subtotal*0.65), amt: Math.round(subtotal*0.65) },
    { d:'Installation, testing, commissioning', q: 1, u:'lot', rate: Math.round(subtotal*0.30), amt: Math.round(subtotal*0.30) },
    { d:'Documentation & handover',           q: 1, u:'lot', rate: subtotal - Math.round(subtotal*0.65) - Math.round(subtotal*0.30), amt: subtotal - Math.round(subtotal*0.65) - Math.round(subtotal*0.30) },
  ];

  return (
    <Modal open={!!quote} onClose={onClose}
      eyebrow={`${r.status.replace('_',' ')} QUOTE`}
      title={`${r.no} · ${r.title}`}
      width={780}
      actions={<>
        <Btn variant="outline" size="sm" icon="download" onClick={() => onAction(`Generated PDF for ${r.no}.`)}>PDF</Btn>
        <Btn variant="outline" size="sm" icon="share" onClick={() => { try { navigator.clipboard.writeText(`https://sabindia.in/quote/${r.no}`); } catch(e) {} onAction(`Quote link copied to clipboard.`); }}>Share link</Btn>
        {r.status === 'DRAFT'        && <Btn variant="primary" size="sm" icon="upload" onClick={() => onAction(`Quote ${r.no} sent to ${r.client}.`)}>Send to client</Btn>}
        {r.status === 'ACCEPTED'     && <Btn variant="primary" size="sm" icon="check" onClick={() => onAction(`Converted ${r.no} → new project ledger created.`)}>Convert to PO</Btn>}
        {r.status === 'NEGOTIATING'  && <Btn variant="primary" size="sm" icon="refresh" onClick={() => onAction(`Revision started — clone created as ${r.no}-R1.`)}>Revise</Btn>}
      </>}
    >
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap: 12, marginBottom: 18 }}>
        <Field label="Client"        value={r.client} readOnly/>
        <Field label="Status"        value={r.status.replace('_',' ')} readOnly/>
        <Field label="Valid until"   value={r.valid} readOnly/>
        <Field label="Quote total"   value={inr(r.amt)} readOnly/>
      </div>

      <div style={{ border:`1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden', marginBottom: 14 }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom:`1px solid ${TOKENS.rule}` }}>
            {['Description','Qty','UoM','Rate','Amount'].map((h,i) => (
              <th key={i} style={{ padding:'8px 12px', textAlign: i>=1?'right':'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {lines.map((l,i) => (
              <tr key={i} style={{ borderBottom: i<lines.length-1?`1px solid ${TOKENS.rule}`:'none' }}>
                <td style={{ padding:'9px 12px', color: TOKENS.ink }}>{l.d}</td>
                <td style={{ padding:'9px 12px', textAlign:'right', fontFamily: FONT.mono }}>{l.q}</td>
                <td style={{ padding:'9px 12px', textAlign:'right', fontFamily: FONT.mono, color: TOKENS.ink3 }}>{l.u}</td>
                <td style={{ padding:'9px 12px', textAlign:'right', fontFamily: FONT.mono }}>{inr(l.rate)}</td>
                <td style={{ padding:'9px 12px', textAlign:'right', fontFamily: FONT.mono, fontWeight: 600 }}>{inr(l.amt)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ display:'flex', justifyContent:'flex-end' }}>
        <div style={{ minWidth: 280, fontFamily: FONT.sans, fontSize: 12.5 }}>
          <div style={{ display:'flex', justifyContent:'space-between', padding:'4px 0', color: TOKENS.ink2 }}><span>Subtotal</span><span style={{ fontFamily: FONT.mono }}>{inr(subtotal)}</span></div>
          <div style={{ display:'flex', justifyContent:'space-between', padding:'4px 0', color: TOKENS.ink2 }}><span>GST 18%</span><span style={{ fontFamily: FONT.mono }}>{inr(gst)}</span></div>
          <div style={{ display:'flex', justifyContent:'space-between', padding:'10px 0 0', borderTop:`1px solid ${TOKENS.rule}`, marginTop: 6, fontWeight: 600, color: TOKENS.ink }}>
            <span>Total</span><span style={{ fontFamily: FONT.mono }}>{inr(r.amt)}</span>
          </div>
        </div>
      </div>
    </Modal>
  );
}

  if (open) {
    return <PurchaseOrderDetail
      po={open}

  const pendingApproval = orders.filter(p => p.status === 'pending-approval');
  const awaitingReceipt = orders.filter(p => ['sent','approved','partially-received'].includes(p.status));
  const monthValue = orders.filter(p => p.issueDate.includes('Apr 26')).reduce((a,p)=>a+p.total,0);

  const exportCsv = () => setToast({ tone:'positive', msg:`Exported ${rows.length} POs (${filter === 'all' ? 'all statuses' : filter}) to purchase_orders.csv.` });

  const submitPo = () => {
    const qty = +draft.qty, rate = +draft.rate, gstPct = +draft.gstPct;
    if (!draft.sku.trim() || !draft.desc.trim()) { setToast({ tone:'amber', msg:'SKU and description are required.' }); return; }
    if (qty <= 0 || rate <= 0)                    { setToast({ tone:'amber', msg:'Qty and rate must be greater than zero.' }); return; }
    const subtotal = qty * rate;
    const gstAmount = Math.round(subtotal * gstPct / 100);
    const total = subtotal + gstAmount;
    const tier = approvalTierFor(total);
    const status = tier === 'auto' ? 'approved' : 'pending-approval';
    const seq = String(118 + orders.length).padStart(4, '0');
    const nextId = `SAB/PO/26/${seq}`;
    const today = new Date();
    const issueDate = today.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'2-digit' });
    const po = {
      id: nextId, vendorId: draft.vendorId, projectId: draft.projectId,
      issueDate, expectedDate: draft.expectedDate || '—',
      status, approvalTier: tier,
      approvedBy: tier === 'auto' ? 'Auto · under ₹1L' : null,
      approvedAt: tier === 'auto' ? today.toISOString() : null,
      lines: [{ sku: draft.sku.trim(), desc: draft.desc.trim(), qty, uom: draft.uom, rate, gstPct }],
      subtotal, gstAmount, total, receivedQty: 0, billedAmount: 0,
    };
    setOrders([po, ...orders]);
    setFormOpen(false);
    setDraft({ ...draft, sku:'', desc:'', qty:0, rate:0, expectedDate:'' });
    setToast({ tone:'positive', msg:`${nextId} created · ${inr(total)} · ${tier === 'auto' ? 'auto-approved' : `awaiting ${tier} approval`}.` });
  };

  const Filter = ({ k, label }) => (
    <button onClick={() => setFilter(k)} style={{
      padding:'5px 10px', borderRadius: 4, fontFamily: FONT.sans, fontSize: 12,
      background: filter === k ? TOKENS.ink : TOKENS.card,
      color: filter === k ? '#fff' : TOKENS.ink2,
      border: `1px solid ${filter === k ? TOKENS.ink : TOKENS.ruleStrong}`,
      cursor:'pointer',
    }}>{label}</button>
  );

  const subtotalPreview = (+draft.qty || 0) * (+draft.rate || 0);
  const totalPreview = subtotalPreview + Math.round(subtotalPreview * (+draft.gstPct || 0) / 100);
  const tierPreview = approvalTierFor(totalPreview);

  return (
    <div style={{ padding: '24px 28px' }}>
      <PageHeader eyebrow="Procurement" title="Purchase orders" description="Outbound POs SAB issues to vendors. Threshold approval (₹1L · ₹10L), 3-way match downstream."
        actions={<>
          <Btn variant="outline" size="sm" icon="download" onClick={exportCsv}>Export</Btn>
          <Btn variant="primary" size="sm" icon="plus" onClick={() => setFormOpen(true)}>New PO</Btn>
        </>}/>
      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}
      {formOpen && (
        <CreateCard title="New purchase order" submitLabel="Create PO" onCancel={() => setFormOpen(false)} onSubmit={submitPo}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
            <FieldSelect label="Vendor" value={draft.vendorId} onChange={e => setDraft({...draft, vendorId: e.target.value})}>
              {SEED.vendors.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
            </FieldSelect>
            <FieldSelect label="Project" value={draft.projectId} onChange={e => setDraft({...draft, projectId: e.target.value})}>
              {SEED.projects.map(p => <option key={p.code} value={p.code}>{p.code} — {p.name}</option>)}
            </FieldSelect>
            <Field label="Expected date" value={draft.expectedDate} onChange={e => setDraft({...draft, expectedDate: e.target.value})} placeholder="e.g. 25 Apr 26"/>
          </div>
          <div style={{ fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600, marginBottom: 8 }}>Line item</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 2fr 0.6fr 0.6fr 0.8fr 0.6fr', gap: 8 }}>
            <Field label="SKU" value={draft.sku} onChange={e => setDraft({...draft, sku: e.target.value})} placeholder="PIPE-CS-150"/>
            <Field label="Description" value={draft.desc} onChange={e => setDraft({...draft, desc: e.target.value})} placeholder="150NB CS pipe SCH40"/>
            <Field label="Qty" type="number" value={draft.qty} onChange={e => setDraft({...draft, qty: e.target.value})}/>
            <FieldSelect label="UoM" value={draft.uom} onChange={e => setDraft({...draft, uom: e.target.value})}>
              {['m','no','kg','set','lot','bag'].map(u => <option key={u}>{u}</option>)}
            </FieldSelect>
            <Field label="Rate (₹)" type="number" value={draft.rate} onChange={e => setDraft({...draft, rate: e.target.value})}/>
            <FieldSelect label="GST %" value={draft.gstPct} onChange={e => setDraft({...draft, gstPct: e.target.value})}>
              {[0,5,12,18,28].map(g => <option key={g} value={g}>{g}%</option>)}
            </FieldSelect>
          </div>
          {subtotalPreview > 0 && (
            <div style={{ marginTop: 12, padding: '8px 12px', background: TOKENS.paperAlt, borderRadius: 3, display:'flex', justifyContent:'space-between', fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink2 }}>
              <span>Subtotal {inr(subtotalPreview)} · GST {inr(Math.round(subtotalPreview * (+draft.gstPct || 0) / 100))}</span>
              <span style={{ fontWeight: 600, color: TOKENS.ink }}>Total {inr(totalPreview)} · {tierPreview === 'auto' ? 'auto-approved' : `${tierPreview} approval needed`}</span>
            </div>
          )}
        </CreateCard>
      )}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 16 }}>
        <KPI label="Open POs"           value={open_.length}            sub={`${inr(open_.reduce((a,p)=>a+p.total,0))} value`} accent/>
        <KPI label="Awaiting approval"  value={pendingApproval.length}  sub={`${inr(pendingApproval.reduce((a,p)=>a+p.total,0))}`}/>
        <KPI label="Awaiting receipt"   value={awaitingReceipt.length}  sub="GRN pending"/>
        <KPI label="Issued · this month" value={inr(monthValue)}        sub={`${orders.filter(p=>p.issueDate.includes('Apr 26')).length} POs · Apr 26`}/>
      </div>
      <div style={{ display:'flex', gap: 6, marginBottom: 12 }}>
        <Filter k="all" label="All"/>
        <Filter k="pending-approval" label="Pending approval"/>
        <Filter k="sent" label="Sent"/>
        <Filter k="partially-received" label="Partially received"/>
        <Filter k="received" label="Received"/>
        <Filter k="closed" label="Closed"/>
      </div>
      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['PO #','Vendor','Project','Issued','Expected','Status','Approval','Total',''].map((h, i) => (
              <th key={i} style={{ padding:'8px 12px', textAlign: i===7 ? 'right' : 'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {rows.map((p, i) => {
              const v = vendorById(p.vendorId);
              return (
                <tr key={i} onClick={() => setOpen(p)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                  <td style={{ padding:'10px 12px' }}><Code>{p.id}</Code></td>
                  <td style={{ padding:'10px 12px', color: TOKENS.ink, fontWeight:500 }}>{v.name}</td>
                  <td style={{ padding:'10px 12px' }}><Code style={{ color: TOKENS.ink3 }}>{p.projectId}</Code></td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{p.issueDate}</td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{p.expectedDate}</td>
                  <td style={{ padding:'10px 12px' }}><Pill tone={PO_TONE[p.status]} size="sm" dot>{p.status.replace(/-/g,' ')}</Pill></td>
                  <td style={{ padding:'10px 12px' }}><Pill tone="ink" size="sm">{p.approvalTier}</Pill></td>
                  <td style={{ padding:'10px 12px', textAlign:'right', fontFamily: FONT.mono, fontWeight:600, color: TOKENS.ink }}>{inr(p.total)}</td>
                  <td style={{ padding:'10px 8px', color: TOKENS.ink4 }}><Icon name="chevRight" size={13}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PurchaseOrderDetail({ po, onBack, onUpdate }) {
  const [status, setStatus] = React.useState(po.status);
  const [approvedBy, setApprovedBy] = React.useState(po.approvedBy);
  const [toast, setToast] = React.useState(null);
  const v = vendorById(po.vendorId);
  const grns = SEED.grns.filter(g => g.poId === po.id);
  const bills = SEED.vendorBills.filter(b => b.poId === po.id);
  const tier = approvalTierFor(po.total);

  const propagate = (next) => { if (onUpdate) onUpdate({ ...po, ...next }); };

  const approve = () => {
    setStatus('approved');
    setApprovedBy('Anita Rao');
    propagate({ status:'approved', approvedBy:'Anita Rao', approvedAt: new Date().toISOString() });
    setToast({ tone:'positive', msg:`${po.id} approved by Anita Rao. Ready to send to ${v.name}.` });
  };

  const sendBack = () => {
    setStatus('draft');
    propagate({ status:'draft' });
    setToast({ tone:'amber', msg:`${po.id} returned to draft for revisions.` });
  };

  const downloadPdf = () => setToast({ tone:'positive', msg:`${po.id}.pdf queued for download.` });

  return (
    <div style={{ padding:'22px 28px 48px' }}>
      <div style={{ display:'flex', alignItems:'center', gap: 8, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3, marginBottom: 16 }}>
        <button onClick={onBack} style={{ background:'transparent', border:'none', color: TOKENS.ink3, cursor:'pointer', padding: 0, fontSize: 12 }}>Purchase orders</button>
        <Icon name="chevRight" size={11}/>
        <span style={{ color: TOKENS.ink }}>{po.id}</span>
      </div>
      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 24, marginBottom: 18 }}>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap: 10, marginBottom: 8 }}>
            <Code style={{ fontSize: 13, padding:'3px 8px', background: TOKENS.accentWash, borderRadius: 3 }}>{po.id}</Code>
            <Pill tone={PO_TONE[status]} dot>{status.replace(/-/g,' ')}</Pill>
            <Pill tone="ink" size="sm">{tier} approval</Pill>
            <Pill tone="ink" size="sm">{po.projectId}</Pill>
          </div>
          <h1 style={{ fontFamily: FONT.sans, fontSize: 24, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.025em', margin: 0 }}>{v.name}</h1>
          <div style={{ marginTop: 6, fontFamily: FONT.sans, fontSize: 13, color: TOKENS.ink3 }}>
            Issued {po.issueDate} · expected {po.expectedDate}{approvedBy ? ` · approved by ${approvedBy}` : ''}
          </div>
        </div>
        <div style={{ display:'flex', gap: 8 }}>
          <Btn variant="outline" size="sm" icon="download" onClick={downloadPdf}>PDF</Btn>
          {status === 'pending-approval' && tier !== 'auto' && (
            <>
              <Btn variant="outline" size="sm" onClick={sendBack}>Send back</Btn>
              <Btn variant="primary" size="sm" icon="check" onClick={approve}>Approve</Btn>
            </>
          )}
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 1, background: TOKENS.rule, borderRadius: 4, overflow:'hidden', marginBottom: 18 }}>
        <StatBlock label="Subtotal"   value={inr(po.subtotal)}   sub={`${po.lines.length} line${po.lines.length>1?'s':''}`}/>
        <StatBlock label="GST (18%)"  value={inr(po.gstAmount)}  sub={v.state === 'Karnataka' ? 'CGST + SGST' : 'IGST'}/>
        <StatBlock label="Total"      value={inr(po.total)}      sub="invoice value" accent/>
        <StatBlock label="Received"   value={`${po.receivedQty} / ${po.lines.reduce((a,l)=>a+l.qty,0)}`} sub={grns.length ? `${grns.length} GRN${grns.length>1?'s':''}` : 'no GRN yet'}/>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr', gap: 16 }}>
        <Card title="Line items">
          <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12 }}>
            <thead><tr style={{ borderBottom: `1px solid ${TOKENS.rule}` }}>
              {['SKU','Description','Qty','Rate','GST','Amount'].map((h, i) => (
                <th key={i} style={{ padding:'8px 0', textAlign: i>=2?'right':'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {po.lines.map((l, i) => (
                <tr key={i} style={{ borderBottom: `1px dashed ${TOKENS.rule}` }}>
                  <td style={{ padding:'10px 0' }}><Code>{l.sku}</Code></td>
                  <td style={{ padding:'10px 0', color: TOKENS.ink }}>{l.desc}</td>
                  <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono }}>{l.qty} {l.uom}</td>
                  <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono }}>{inr(l.rate, { compact:false })}</td>
                  <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono, color: TOKENS.ink3 }}>{l.gstPct}%</td>
                  <td style={{ padding:'10px 0', textAlign:'right', fontFamily: FONT.mono, fontWeight: 600 }}>{inr(l.qty * l.rate)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>

        <div style={{ display:'flex', flexDirection:'column', gap: 16 }}>
          <Card title="Goods receipts" sub={grns.length ? `${grns.length} GRN${grns.length>1?'s':''}` : 'awaiting receipt'}>
            {grns.length === 0 && <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>No goods received yet.</div>}
            {grns.map((g, i) => (
              <div key={i} style={{ padding:'8px 0', borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <Code>{g.id}</Code>
                  <Pill tone={GRN_TONE[g.status]} size="sm" dot>{g.status.replace('-',' ')}</Pill>
                </div>
                <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3, marginTop: 3 }}>{g.receivedDate} · {g.vehicleNo}</div>
              </div>
            ))}
          </Card>
          <Card title="Vendor bills" sub={bills.length ? `${bills.length} bill${bills.length>1?'s':''}` : 'no bills yet'}>
            {bills.length === 0 && <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>Awaiting vendor invoice.</div>}
            {bills.map((b, i) => (
              <div key={i} style={{ padding:'8px 0', borderTop: i > 0 ? `1px dashed ${TOKENS.rule}` : 'none', display:'flex', justifyContent:'space-between', alignItems:'center', fontFamily: FONT.sans, fontSize: 12 }}>
                <Code>{b.id}</Code>
                <Pill tone={BILL_TONE[b.status]} size="sm" dot>{b.status.replace('-',' ')}</Pill>
                <span style={{ fontFamily: FONT.mono, fontWeight: 600 }}>{inr(b.total)}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}

// ─── GRNs ─────────────────────────────────────────────────────────────────────
function GRNsRoute() {
  const [grns, setGrns] = React.useState(SEED.grns);
  const [open, setOpen] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [formOpen, setFormOpen] = React.useState(false);
  const [draft, setDraft] = React.useState({
    poId: SEED.purchaseOrders[0]?.id || '',
    receivedDate: '',
    vehicleNo: '',
    invoiceRef: '',
    receivedBy: 'Site Eng. - Vikram',
    receivedQty: 0,
    rejectedQty: 0,
    remarks: '',
  });

  if (open) return <GRNDetail grn={open} onBack={() => setOpen(null)}/>;

  const exportCsv = () => setToast({ tone:'positive', msg:`Exported ${grns.length} GRNs to goods_receipts.csv.` });

  const submitGrn = () => {
    const po = SEED.purchaseOrders.find(p => p.id === draft.poId);
    if (!po)                                   { setToast({ tone:'amber', msg:'Select a valid PO.' }); return; }
    if (!draft.receivedDate || !draft.vehicleNo) { setToast({ tone:'amber', msg:'Received date and vehicle number are required.' }); return; }
    const recv = +draft.receivedQty, rej = +draft.rejectedQty;
    const line = po.lines[0];
    if (recv <= 0 || recv > line.qty) { setToast({ tone:'amber', msg:`Received qty must be between 1 and ${line.qty} ${line.uom}.` }); return; }
    const acceptedQty = Math.max(0, recv - rej);
    const status = rej === recv ? 'rejected' : recv < line.qty || rej > 0 ? 'partially-accepted' : 'accepted';
    const seq = String(91 + grns.length).padStart(4, '0');
    const nextId = `SAB/GRN/26/${seq}`;
    const grn = {
      id: nextId, poId: draft.poId, vendorId: po.vendorId,
      receivedDate: draft.receivedDate, receivedBy: draft.receivedBy,
      status,
      lines: [{
        sku: line.sku, orderedQty: line.qty,
        receivedQty: recv, acceptedQty, rejectedQty: rej,
        remarks: draft.remarks || (recv < line.qty ? `${line.qty - recv} ${line.uom} short` : 'OK'),
      }],
      vehicleNo: draft.vehicleNo, invoiceRef: draft.invoiceRef || '—',
    };
    setGrns([grn, ...grns]);
    setFormOpen(false);
    setDraft({ ...draft, receivedDate:'', vehicleNo:'', invoiceRef:'', receivedQty:0, rejectedQty:0, remarks:'' });
    setToast({ tone:'positive', msg:`${nextId} recorded for ${draft.poId} · ${status.replace('-',' ')}.` });
  };

  const partial = grns.filter(g => g.status === 'partially-accepted').length;
  const rejects = grns.filter(g => g.status === 'rejected').length;

  const selectedPo = SEED.purchaseOrders.find(p => p.id === draft.poId);
  const selectedLine = selectedPo?.lines[0];

  return (
    <div style={{ padding:'24px 28px' }}>
      <PageHeader eyebrow="Procurement" title="Goods receipts" description="Site teams record what physically arrived. Shortages and rejections drive vendor credit notes."
        actions={<>
          <Btn variant="outline" size="sm" icon="download" onClick={exportCsv}>Export</Btn>
          <Btn variant="primary" size="sm" icon="plus" onClick={() => setFormOpen(true)}>New GRN</Btn>
        </>}/>
      {toast && <Notice tone={toast.tone} onClose={() => setToast(null)}>{toast.msg}</Notice>}
      {formOpen && (
        <CreateCard title="New goods receipt" submitLabel="Record GRN" onCancel={() => setFormOpen(false)} onSubmit={submitGrn}>
          <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
            <FieldSelect label="Against PO" value={draft.poId} onChange={e => setDraft({...draft, poId: e.target.value, receivedQty: 0})}>
              {SEED.purchaseOrders.filter(p => ['sent','approved','partially-received'].includes(p.status)).map(p => (
                <option key={p.id} value={p.id}>{p.id} — {vendorById(p.vendorId).name}</option>
              ))}
            </FieldSelect>
            <Field label="Received date" value={draft.receivedDate} onChange={e => setDraft({...draft, receivedDate: e.target.value})} placeholder="e.g. 22 Apr 26"/>
            <Field label="Vehicle no." value={draft.vehicleNo} onChange={e => setDraft({...draft, vehicleNo: e.target.value})} placeholder="MH-12 KL 4521"/>
            <Field label="Vendor invoice ref" value={draft.invoiceRef} onChange={e => setDraft({...draft, invoiceRef: e.target.value})} placeholder="HPF/INV/26/2241"/>
          </div>
          {selectedLine && (
            <div style={{ marginBottom: 10, padding:'8px 12px', background: TOKENS.paperAlt, borderRadius: 3, fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink2 }}>
              Line: <Code>{selectedLine.sku}</Code> · {selectedLine.desc} · ordered <strong>{selectedLine.qty} {selectedLine.uom}</strong>
            </div>
          )}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 2fr', gap: 10 }}>
            <Field label={`Received qty (${selectedLine?.uom || ''})`} type="number" value={draft.receivedQty} onChange={e => setDraft({...draft, receivedQty: e.target.value})}/>
            <Field label={`Rejected qty (${selectedLine?.uom || ''})`} type="number" value={draft.rejectedQty} onChange={e => setDraft({...draft, rejectedQty: e.target.value})}/>
            <Field label="Remarks" value={draft.remarks} onChange={e => setDraft({...draft, remarks: e.target.value})} placeholder="e.g. 2m short — vendor to credit"/>
          </div>
        </CreateCard>
      )}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14, marginBottom: 16 }}>
        <KPI label="GRNs · this month" value={grns.length}  sub="6 vendors" accent/>
        <KPI label="Partial receipts"  value={partial}      sub="awaiting balance dispatch"/>
        <KPI label="Rejected"          value={rejects}      sub="full / partial returns"/>
        <KPI label="Pending QC"        value={2}            sub="held at site for inspection"/>
      </div>
      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontFamily: FONT.sans, fontSize: 12.5 }}>
          <thead><tr style={{ background: TOKENS.paperAlt, borderBottom: `1px solid ${TOKENS.rule}` }}>
            {['GRN #','PO #','Vendor','Received','Items','Status','Received by',''].map((h, i) => (
              <th key={i} style={{ padding:'8px 12px', textAlign:'left', fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, letterSpacing:'.08em', textTransform:'uppercase', fontWeight: 600 }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {grns.map((g, i) => {
              const v = vendorById(g.vendorId);
              const items = g.lines.length;
              return (
                <tr key={i} onClick={() => setOpen(g)} style={{ borderBottom:`1px solid ${TOKENS.rule}`, cursor:'pointer' }}>
                  <td style={{ padding:'10px 12px' }}><Code>{g.id}</Code></td>
                  <td style={{ padding:'10px 12px' }}><Code style={{ color: TOKENS.ink3 }}>{g.poId}</Code></td>
                  <td style={{ padding:'10px 12px', color: TOKENS.ink, fontWeight:500 }}>{v.name}</td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{g.receivedDate}</td>
                  <td style={{ padding:'10px 12px', fontFamily: FONT.mono, color: TOKENS.ink2 }}>{items} SKU{items>1?'s':''}</td>
