<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>SAB India Tracker — Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html,body { margin:0; padding:0; background: oklch(0.96 0.006 80); font-family:'Inter Tight',system-ui,sans-serif; color: oklch(0.22 0.01 60); }
    * { box-sizing: border-box; }
    .frame { box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 10px 30px rgba(40,30,20,.08); border-radius: 6px; overflow:hidden; background:#fff; }
    .phone-shell { border-radius: 42px; background: #111; padding: 10px; box-shadow: 0 20px 50px rgba(0,0,0,.2), 0 4px 10px rgba(0,0,0,.08); }
    .phone-inner { border-radius: 34px; overflow:hidden; background:#fff; width:100%; height:100%; position:relative; }
    .notch { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:110px; height:26px; background:#000; border-radius:18px; z-index:20; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="sab/system.jsx"></script>
<script type="text/babel" src="sab/seed.jsx"></script>
<script type="text/babel" src="sab/shell.jsx"></script>
<script type="text/babel" src="sab/route-home.jsx"></script>
<script type="text/babel" src="sab/route-projects.jsx"></script>
<script type="text/babel" src="sab/route-project-detail.jsx"></script>
<script type="text/babel" src="sab/route-rest.jsx"></script>
<script type="text/babel" src="sab/mobile.jsx"></script>
<script type="text/babel" src="sab/invoice.jsx"></script>
<script type="text/babel" src="sab/app.jsx"></script>
<script type="text/babel" src="sab/design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
function DeskFrame({ w = 1400, h = 900, children, label }) {
  return (
    <div className="frame" style={{ width: w, height: h, background:'#fff' }}>
      {/* window chrome */}
      <div style={{ height: 28, background:'oklch(0.94 0.006 80)', borderBottom:'1px solid oklch(0.88 0.006 80)', display:'flex', alignItems:'center', padding:'0 12px', gap: 6 }}>
        <span style={{ width:10, height:10, borderRadius:10, background:'#ed6a5e' }}/>
        <span style={{ width:10, height:10, borderRadius:10, background:'#f5bf4f' }}/>
        <span style={{ width:10, height:10, borderRadius:10, background:'#62c554' }}/>
        <div style={{ flex:1, textAlign:'center', fontFamily:'IBM Plex Mono,monospace', fontSize:11, color:'oklch(0.55 0.01 60)' }}>
          tracker.sabindia.in {label ? `· ${label}` : ''}
        </div>
      </div>
      <div style={{ width:'100%', height:`calc(100% - 28px)` }}>{children}</div>
    </div>
  );
}

function Phone({ children, w = 360, h = 740 }) {
  return (
    <div className="phone-shell" style={{ width: w + 20, height: h + 20 }}>
      <div className="phone-inner" style={{ width:'100%', height:'100%' }}>
        <div className="notch"/>
        {children}
      </div>
    </div>
  );
}

// Brand / system page
function BrandSheet() {
  const swatches = [
    { n:'Paper',    v:'oklch(0.985 0.003 80)' },
    { n:'Paper-alt',v:'oklch(0.975 0.004 80)' },
    { n:'Ink',      v:'oklch(0.22 0.01 60)' },
    { n:'Ink-2',    v:'oklch(0.38 0.01 60)' },
    { n:'Ink-3',    v:'oklch(0.55 0.01 60)' },
    { n:'Rule',     v:'oklch(0.92 0.005 80)' },
    { n:'Accent (signal)', v:'oklch(0.68 0.16 45)' },
    { n:'Accent-ink', v:'oklch(0.42 0.14 45)' },
    { n:'Positive', v:'oklch(0.58 0.11 155)' },
    { n:'Alert',    v:'oklch(0.58 0.18 25)' },
    { n:'Amber',    v:'oklch(0.74 0.14 78)' },
    { n:'Blue',     v:'oklch(0.56 0.12 240)' },
  ];

  return (
    <div style={{ width: 1200, minHeight: 900, padding: 40, background: TOKENS.paper, fontFamily: FONT.sans }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom: 28 }}>
        <div>
          <Wordmark size={20}/>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.15em', textTransform:'uppercase', fontWeight: 600, marginTop: 14 }}>Design system · v0.1</div>
          <h1 style={{ fontFamily: FONT.sans, fontSize: 32, fontWeight: 600, letterSpacing:'-0.03em', margin: '4px 0 0' }}>Industrial operations, papered.</h1>
          <div style={{ fontFamily: FONT.sans, fontSize: 14, color: TOKENS.ink3, marginTop: 8, maxWidth: 680 }}>Warm neutrals and a single signal orange. Monospace for codes, identifiers and numbers. Fine rules and tight density — the tool has to feel <em>rugged</em>, not corporate SaaS.</div>
        </div>
        <Pill tone="accent" dot>FY 25-26</Pill>
      </div>

      {/* Colors */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap: 10, marginBottom: 32 }}>
        {swatches.map((s, i) => (
          <div key={i} style={{ border:`1px solid ${TOKENS.rule}`, borderRadius: 4, overflow:'hidden', background:'#fff' }}>
            <div style={{ height: 72, background: s.v }}/>
            <div style={{ padding: 10 }}>
              <div style={{ fontFamily: FONT.sans, fontSize: 12, fontWeight: 600, color: TOKENS.ink }}>{s.n}</div>
              <div style={{ fontFamily: FONT.mono, fontSize: 9.5, color: TOKENS.ink3, marginTop: 2 }}>{s.v}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Type */}
      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 24, marginBottom: 24 }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 14 }}>Type scale</div>
        <div style={{ display:'grid', gridTemplateColumns:'180px 1fr', gap: 14, alignItems:'baseline' }}>
          {[
            { k:'Display / 32', c:'Industrial operations, papered.',  s: 32, w: 600, ls:'-0.03em', f: FONT.sans },
            { k:'H1 / 26',      c:'Fire hydrant system — Block A & B', s: 26, w: 600, ls:'-0.025em', f: FONT.sans },
            { k:'H2 / 16',      c:'Portfolio P&L · FY 25-26',          s: 16, w: 600, ls:'-0.015em', f: FONT.sans },
            { k:'Body / 13',    c:'Every project, invoice, crew hour and stock issue — one ledger.', s: 13, w: 400, f: FONT.sans },
            { k:'Small / 11',   c:'12 of 18 hydrant points pressure-tested. All passing at 12 bar.', s: 11, w: 400, color: TOKENS.ink3, f: FONT.sans },
            { k:'Code / 12',    c:'SAB-26-0041 · APL/PO/26/0847 · 29AABCS1234M1Z5', s: 12, w: 500, f: FONT.mono, color: TOKENS.accentInk },
            { k:'Label / 10',   c:'CONTRACT · BILLED · OUTSTANDING · PROGRESS',    s: 10, w: 600, f: FONT.mono, ls:'.12em', color: TOKENS.ink3 },
          ].map((t, i) => (
            <React.Fragment key={i}>
              <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3 }}>{t.k}</div>
              <div style={{ fontFamily: t.f, fontSize: t.s, fontWeight: t.w, letterSpacing: t.ls || 'normal', color: t.color || TOKENS.ink }}>{t.c}</div>
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Status pills + buttons + KPI */}
      <div style={{ display:'grid', gridTemplateColumns:'1.2fr 1fr 1fr', gap: 16, marginBottom: 24 }}>
        <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 20 }}>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 12 }}>Status system</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap: 8, marginBottom: 12 }}>
            <Pill tone="blue" dot>IN PROGRESS</Pill>
            <Pill tone="positive" dot>COMMISSIONED</Pill>
            <Pill tone="positive" dot>PAID</Pill>
            <Pill tone="amber" dot>MATERIAL READY</Pill>
            <Pill tone="alert" dot>ON HOLD</Pill>
            <Pill tone="alert" dot>LOW STOCK</Pill>
            <Pill tone="ink" dot>DRAFT</Pill>
            <Pill tone="accent" dot>FY 25-26</Pill>
          </div>
          <div style={{ fontFamily: FONT.sans, fontSize: 12, color: TOKENS.ink3 }}>
            Pills are monospace, uppercase, 3px radius — they read as industrial labels, not UI chrome. The dot carries the status, the case carries the hierarchy.
          </div>
        </div>
        <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 20 }}>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 12 }}>Buttons</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap: 8 }}>
            <Btn variant="primary" icon="plus">New invoice</Btn>
            <Btn variant="default" icon="check">Approve</Btn>
            <Btn variant="outline" icon="download">Export</Btn>
            <Btn variant="subtle">Cancel</Btn>
            <Btn variant="ghost" icon="refresh">Refresh</Btn>
          </div>
        </div>
        <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 20 }}>
          <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 12 }}>KPI tile</div>
          <KPI label="Portfolio PO" value="₹14.26 Cr" sub="165 POs · FY 25-26" trend={12} accent/>
        </div>
      </div>

      {/* Rupee format demo */}
      <div style={{ background: TOKENS.card, border: `1px solid ${TOKENS.rule}`, borderRadius: 4, padding: 20 }}>
        <div style={{ fontFamily: FONT.mono, fontSize: 10, color: TOKENS.ink3, letterSpacing:'.1em', textTransform:'uppercase', fontWeight: 600, marginBottom: 12 }}>Rupee formatting — lakh/crore native</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap: 14 }}>
          {[
            { n: 48200, compact:'₹48.2k', full:'₹48,200' },
            { n: 4820000, compact:'₹48.20 L', full:'₹48,20,000' },
            { n: 14260000, compact:'₹1.43 Cr', full:'₹1,42,60,000' },
            { n: 142600000, compact:'₹14.3 Cr', full:'₹14,26,00,000' },
          ].map((r, i) => (
            <div key={i}>
              <div style={{ fontFamily: FONT.sans, fontSize: 20, fontWeight: 600, color: TOKENS.ink, letterSpacing:'-0.02em' }}>{inr(r.n)}</div>
              <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3, marginTop: 2 }}>compact</div>
              <div style={{ fontFamily: FONT.mono, fontSize: 12, color: TOKENS.ink2, marginTop: 8 }}>{inr(r.n, { compact: false })}</div>
              <div style={{ fontFamily: FONT.mono, fontSize: 10.5, color: TOKENS.ink3, marginTop: 2 }}>full · Indian grouping</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="system" title="Foundation" subtitle="Tokens, type, status — the language the whole product speaks.">
        <DCArtboard id="brand" label="Brand + tokens" width={1200} height={900}>
          <BrandSheet/>
        </DCArtboard>
      </DCSection>

      <DCSection id="auth" title="Entry" subtitle="The sign-in screen every supervisor, admin and finance lead opens on Monday.">
        <DCArtboard id="login" label="Sign-in" width={1280} height={820}>
          <LoginScreen/>
        </DCArtboard>
      </DCSection>

      <DCSection id="desktop" title="Desktop · admin & finance" subtitle="Dense, rugged tables. Indian-rupee maths. Eight routes from one shell.">
        <DCArtboard id="home" label="01 · Home — operations overview" width={1400} height={1100}>
          <DeskFrame w={1400} h={1100} label="home"><DesktopApp startRoute="home"/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="projects" label="02 · Projects — list + filters" width={1400} height={1100}>
          <DeskFrame w={1400} h={1100} label="projects"><DesktopApp startRoute="projects"/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="detail" label="03 · Project — hero detail" width={1400} height={1300}>
          <DeskFrame w={1400} h={1300} label="SAB-26-0041"><DesktopDetail/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="invoices" label="04 · Invoices" width={1400} height={900}>
          <DeskFrame w={1400} h={900} label="invoices"><DesktopApp startRoute="invoices"/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="quotes" label="05 · Quotes" width={1400} height={900}>
          <DeskFrame w={1400} h={900} label="quotes"><DesktopApp startRoute="quotes"/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="inventory" label="06 · Inventory" width={1400} height={900}>
          <DeskFrame w={1400} h={900} label="inventory"><DesktopApp startRoute="inventory"/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="timesheets" label="07 · Timesheets" width={1400} height={900}>
          <DeskFrame w={1400} h={900} label="timesheets"><DesktopApp startRoute="timesheets"/></DeskFrame>
        </DCArtboard>
        <DCArtboard id="reports" label="08 · Reports — index" width={1400} height={900}>
          <DeskFrame w={1400} h={900} label="reports"><DesktopApp startRoute="reports"/></DeskFrame>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile · site crew" subtitle="The punch app — supervisors clock in with a geo-stamp. Light and dark live states.">
        <DCArtboard id="m-ready" label="Pre-punch · ready on site" width={400} height={820}>
          <Phone w={380} h={800}><MobilePunchApp state="ready"/></Phone>
        </DCArtboard>
        <DCArtboard id="m-live" label="Live · punched in (9:13 in)" width={400} height={820}>
          <Phone w={380} h={800}><MobilePunchApp state="punchedIn"/></Phone>
        </DCArtboard>
      </DCSection>

      <DCSection id="docs" title="Documents & share" subtitle="Client-facing artifacts — the tax invoice and the share-a-project page.">
        <DCArtboard id="pdf" label="Tax invoice · A4" width={820} height={1150}>
          <InvoicePDF/>
        </DCArtboard>
        <DCArtboard id="share" label="Client share view" width={1000} height={900}>
          <DeskFrame w={1000} h={900} label="share.sabindia.in/SAB-26-0041"><ClientShareView/></DeskFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

// Stable wrapper that opens to the project detail directly
function DesktopDetail() {
  const [route, setRoute] = React.useState('projectDetail');
  return (
    <div style={{ width:'100%', height:'100%', display:'flex', background: TOKENS.paper, fontFamily: FONT.sans, overflow:'hidden' }}>
      <Sidebar current="projects" onNav={() => {}} collapsed={false} onToggle={() => {}}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth: 0 }}>
        <TopBar title="SAB-26-0041 — Fire hydrant system"/>
        <div style={{ flex:1, overflowY:'auto' }}>
          <ProjectDetailRoute onNav={() => {}}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
